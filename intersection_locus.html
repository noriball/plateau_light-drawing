const hitFxBursts = [];
const hitFxChains = [];
const lastHitFxByKey = {};
const lastHitSoundMsByKey = {};
let hitAudioCtx = null;
let hitAudioMaster = null;
const soundBuffers = {};

/** ペンタトニック（Aマイナー.pentatonic 風）の半音オフセット */
const PENTA_SEMI = [0, 3, 5, 7, 10];
const PENTA_ROOT_MIDI = 57;
const SOUND_BASE_HZ = {
  kalimba: 329.63,
  bell: 392,
  wood: 261.63,
  pop: 440,
  marimba: 196,
  airy: 523.25,
  chime: 440,
};

function clampFxStyle(v, max) {
  const n = parseInt(v, 10);
  if (!Number.isFinite(n)) return 0;
  return Math.max(0, Math.min(max, n));
}

function ensureHitAudio() {
  if (!hitAudioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) hitAudioCtx = new AC();
  }
  return hitAudioCtx;
}

function unlockHitAudio() {
  const ac = ensureHitAudio();
  if (ac && ac.state === 'suspended') ac.resume().catch(() => {});
  if (ac) preloadSoundBuffers(ac);
}

function ensureHitAudioBus(ac) {
  if (!hitAudioMaster) {
    hitAudioMaster = ac.createGain();
    hitAudioMaster.gain.value = 0.72;
    const soft = ac.createBiquadFilter();
    soft.type = 'lowpass';
    soft.frequency.value = 7200;
    soft.Q.value = 0.6;
    hitAudioMaster.connect(soft);
    soft.connect(ac.destination);
  }
  return hitAudioMaster;
}

function midiToHz(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

/** 世界座標 → ペンタトニック上の周波数（きりの良い音程） */
function worldToPentatonicHz(wx, wy, hue) {
  const s = Math.max(80, view.scale * 110);
  const u = (wx / s) * 0.2 + (wy / s) * 0.16 + (hue % 360) / 360 * 0.35;
  const wrapped = ((u % 2.4) + 2.4) % 2.4;
  const steps = PENTA_SEMI.length * 2;
  const idx = Math.max(0, Math.min(steps - 1, Math.round((wrapped / 2.4) * (steps - 1))));
  const octave = Math.floor(idx / PENTA_SEMI.length);
  const semi = PENTA_SEMI[idx % PENTA_SEMI.length];
  return midiToHz(PENTA_ROOT_MIDI + octave * 12 + semi);
}

function timbreForStyle(style) {
  switch (style) {
    case 1: return 'bell';
    case 2: return 'wood';
    case 3: return 'pop';
    case 4: return 'marimba';
    case 5: return 'chime';
    case 6: return 'airy';
    case 7: return 'bell';
    case 8: return 'wood';
    case 9: return 'airy';
    default: return 'kalimba';
  }
}

function renderSoundBuffer(ac, kind) {
  const sr = ac.sampleRate;
  const dur = kind === 'wood' || kind === 'pop' ? 0.14 : kind === 'marimba' ? 0.32 : 0.42;
  const len = Math.ceil(sr * dur);
  const buf = ac.createBuffer(1, len, sr);
  const d = buf.getChannelData(0);
  const f0 = SOUND_BASE_HZ[kind] || SOUND_BASE_HZ.kalimba;
  for (let i = 0; i < len; i++) {
    const t = i / sr;
    let s = 0;
    const atk = Math.min(1, t / 0.003);
    if (kind === 'bell' || kind === 'chime') {
      s = Math.sin(2 * Math.PI * f0 * t) * Math.exp(-t * 7)
        + Math.sin(2 * Math.PI * f0 * 2.01 * t) * Math.exp(-t * 11) * 0.35
        + Math.sin(2 * Math.PI * f0 * 2.76 * t) * Math.exp(-t * 16) * 0.18;
    } else if (kind === 'kalimba' || kind === 'marimba') {
      const damp = kind === 'marimba' ? 9 : 11;
      s = Math.sin(2 * Math.PI * f0 * t) * Math.exp(-t * damp)
        + Math.sin(2 * Math.PI * f0 * 2.0 * t) * Math.exp(-t * damp * 1.4) * 0.22;
    } else if (kind === 'wood') {
      s = Math.sin(2 * Math.PI * f0 * t) * Math.exp(-t * 28)
        + Math.sin(2 * Math.PI * f0 * 2.5 * t) * Math.exp(-t * 35) * 0.15;
    } else if (kind === 'pop') {
      s = Math.sin(2 * Math.PI * f0 * t) * Math.exp(-t * 22);
    } else if (kind === 'airy') {
      s = Math.sin(2 * Math.PI * f0 * t) * Math.exp(-t * 9)
        + Math.sin(2 * Math.PI * f0 * 1.5 * t) * Math.exp(-t * 12) * 0.25;
    }
    if (t < 0.005) s += (Math.random() * 2 - 1) * 0.04 * (1 - t / 0.005);
    d[i] = s * atk;
  }
  let peak = 0;
  for (let i = 0; i < len; i++) peak = Math.max(peak, Math.abs(d[i]));
  if (peak > 1e-6) {
    const g = 0.7 / peak;
    for (let i = 0; i < len; i++) d[i] *= g;
  }
  return buf;
}

function preloadSoundBuffers(ac) {
  Object.keys(SOUND_BASE_HZ).forEach(k => {
    if (!soundBuffers[k]) soundBuffers[k] = renderSoundBuffer(ac, k);
  });
}

function isHitConnected(prev, wx, wy, now) {
  if (!prev) return false;
  if (now - prev.t > 200) return false;
  const maxDist = Math.max(2.5, 24 / view.scale);
  return Math.hypot(wx - prev.wx, wy - prev.wy) < maxDist;
}

function playMalletHit(ac, bus, buffer, baseHz, targetHz, t0, peak, decay) {
  const src = ac.createBufferSource();
  src.buffer = buffer;
  src.playbackRate.value = Math.max(0.35, Math.min(3.2, targetHz / baseHz));
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(Math.max(0.0001, peak), t0 + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + decay);
  src.connect(g);
  g.connect(bus);
  src.start(t0);
  src.stop(t0 + decay + 0.05);
}

function fadeAllPairSounds() { /* サンプル打音方式のため不要 */ }

function playIntersectionSound(key, hue, wx, wy, style, enabled) {
  if (!enabled) return;
  const now = performance.now();
  const minGap = style === 5 ? 130 : style === 2 || style === 8 ? 75 : 100;
  if (now - (lastHitSoundMsByKey[key] || 0) < minGap) return;
  lastHitSoundMsByKey[key] = now;
  const ac = ensureHitAudio();
  if (!ac) return;
  if (ac.state === 'suspended') ac.resume().catch(() => {});
  try {
    const timbre = timbreForStyle(style);
    if (!soundBuffers[timbre]) soundBuffers[timbre] = renderSoundBuffer(ac, timbre);
    const bus = ensureHitAudioBus(ac);
    const t0 = ac.currentTime;
    const hz = worldToPentatonicHz(wx, wy, hue);
    const base = SOUND_BASE_HZ[timbre];
    const s = Math.max(60, view.scale * 100);
    const vol = 0.052 + 0.018 * (0.5 + 0.5 * Math.sin(wx / s) * Math.cos(wy / s));
    const decay = timbre === 'wood' || timbre === 'pop' ? 0.12 : 0.28;

    if (style === 5) {
      const chord = [1, 5 / 4, 3 / 2];
      chord.forEach((r, i) => {
        playMalletHit(ac, bus, soundBuffers.chime, SOUND_BASE_HZ.chime, hz * r, t0 + i * 0.055, vol * 0.42, 0.32);
      });
    } else if (style === 9) {
      playMalletHit(ac, bus, soundBuffers.airy, SOUND_BASE_HZ.airy, hz, t0, vol * 0.9, 0.22);
      playMalletHit(ac, bus, soundBuffers.airy, SOUND_BASE_HZ.airy, hz * 1.25, t0 + 0.04, vol * 0.55, 0.2);
    } else {
      playMalletHit(ac, bus, soundBuffers[timbre], base, hz, t0, vol, decay);
    }
  } catch { /* ignore */ }
}

function notifyIntersectionHit(key, sx, sy, hue, wx, wy) {
  if (!anyShapeRunning()) return;
  const now = performance.now();
  const prev = lastHitFxByKey[key];
  if (prev && now - prev.t < 70 && Math.hypot(prev.wx - wx, prev.wy - wy) < 2.5) return;
  const connected = isHitConnected(prev, wx, wy, now);
  lastHitFxByKey[key] = { wx, wy, sx, sy, t: now };
  const fx = getPairFx(key);
  if (fx.visualEnabled) {
    hitFxBursts.push({ x: sx, y: sy, h: hue, t0: now, style: fx.visualStyle });
    if (hitFxBursts.length > 64) hitFxBursts.shift();
    if (connected && prev && prev.sx != null) {
      hitFxChains.push({
        x0: prev.sx, y0: prev.sy, x1: sx, y1: sy, h: hue, t0: now,
      });
      if (hitFxChains.length > 48) hitFxChains.shift();
    }
  }
  playIntersectionSound(key, hue, wx, wy, fx.soundStyle, fx.soundEnabled);
}

function drawHitFxRing(c, ef, t) {
  const ringR = 4 + t * 22;
  c.beginPath();
  c.arc(ef.x, ef.y, ringR, 0, Math.PI * 2);
  c.strokeStyle = `hsla(${ef.h}, 100%, 78%, ${(1 - t) * 0.85})`;
  c.lineWidth = 2;
  c.stroke();
  c.beginPath();
  c.arc(ef.x, ef.y, 7 * (1 - t * 0.35), 0, Math.PI * 2);
  c.fillStyle = `hsla(${ef.h}, 100%, 92%, ${0.55 * (1 - t)})`;
  c.fill();
}

function drawHitFxStar(c, ef, t, age) {
  const len = 5 + t * 18;
  c.strokeStyle = `hsla(${ef.h}, 100%, 82%, ${(1 - t) * 0.9})`;
  c.lineWidth = 1.8;
  const rot = age * 0.004;
  for (let a = 0; a < 4; a++) {
    const ang = rot + a * Math.PI / 2;
    c.beginPath();
    c.moveTo(ef.x + Math.cos(ang) * len * 0.25, ef.y + Math.sin(ang) * len * 0.25);
    c.lineTo(ef.x + Math.cos(ang) * len, ef.y + Math.sin(ang) * len);
    c.stroke();
  }
  c.beginPath();
  c.arc(ef.x, ef.y, 4 * (1 - t * 0.4), 0, Math.PI * 2);
  c.fillStyle = `hsla(${ef.h}, 100%, 90%, ${0.7 * (1 - t)})`;
  c.fill();
}

function drawHitFxMultiRing(c, ef, t) {
  for (let k = 0; k < 3; k++) {
    const tk = Math.max(0, Math.min(1, t * 1.15 - k * 0.18));
    const ringR = 3 + tk * 20;
    c.beginPath();
    c.arc(ef.x, ef.y, ringR, 0, Math.PI * 2);
    c.strokeStyle = `hsla(${ef.h}, 100%, 75%, ${(1 - tk) * 0.65})`;
    c.lineWidth = 1.5;
    c.stroke();
  }
}

function drawHitFxSparks(c, ef, t) {
  const n = 10;
  for (let i = 0; i < n; i++) {
    const ang = (i / n) * Math.PI * 2 + ef.h * 0.02;
    const r = 3 + t * 22;
    c.beginPath();
    c.arc(ef.x + Math.cos(ang) * r, ef.y + Math.sin(ang) * r, 1.8 * (1 - t * 0.6), 0, Math.PI * 2);
    c.fillStyle = `hsla(${ef.h + i * 8}, 100%, 85%, ${(1 - t) * 0.9})`;
    c.fill();
  }
}

function drawHitFxStreak(c, ef, t) {
  const len = 10 + t * 32;
  c.strokeStyle = `hsla(${ef.h}, 100%, 88%, ${(1 - t) * 0.95})`;
  c.lineWidth = 3 * (1 - t * 0.45);
  c.lineCap = 'round';
  c.beginPath();
  c.moveTo(ef.x - len * 0.55, ef.y);
  c.lineTo(ef.x + len * 0.45, ef.y);
  c.stroke();
  c.beginPath();
  c.arc(ef.x + len * 0.35, ef.y, 3.5 * (1 - t), 0, Math.PI * 2);
  c.fillStyle = `hsla(${ef.h}, 100%, 95%, ${1 - t})`;
  c.fill();
}

function drawHitFxPulse(c, ef, t) {
  const r = 3 + t * 16;
  c.beginPath();
  c.arc(ef.x, ef.y, r, 0, Math.PI * 2);
  c.fillStyle = `hsla(${ef.h}, 95%, 70%, ${(1 - t) * 0.45})`;
  c.fill();
  c.strokeStyle = `hsla(${ef.h}, 100%, 88%, ${(1 - t) * 0.7})`;
  c.lineWidth = 1.5;
  c.stroke();
}

function drawHitFxDiamond(c, ef, t) {
  const s = 4 + t * 14;
  c.strokeStyle = `hsla(${ef.h}, 100%, 80%, ${1 - t})`;
  c.lineWidth = 1.6;
  c.beginPath();
  c.moveTo(ef.x, ef.y - s);
  c.lineTo(ef.x + s, ef.y);
  c.lineTo(ef.x, ef.y + s);
  c.lineTo(ef.x - s, ef.y);
  c.closePath();
  c.stroke();
}

function drawHitFxSpiral(c, ef, t, age) {
  c.strokeStyle = `hsla(${ef.h}, 100%, 78%, ${1 - t})`;
  c.lineWidth = 1.5;
  c.beginPath();
  for (let i = 0; i <= 24; i++) {
    const u = i / 24;
    const ang = u * 1.2 * Math.PI * 2 + age * 0.003;
    const r = u * (4 + t * 14);
    const px = ef.x + Math.cos(ang) * r;
    const py = ef.y + Math.sin(ang) * r;
    if (i === 0) c.moveTo(px, py);
    else c.lineTo(px, py);
  }
  c.stroke();
}

function drawHitFxShock(c, ef, t) {
  [0, 0.22].forEach((lag, i) => {
    const tk = Math.max(0, t - lag);
    c.beginPath();
    c.arc(ef.x, ef.y, 2 + tk * (i ? 24 : 16), 0, Math.PI * 2);
    c.strokeStyle = `hsla(${ef.h}, 100%, ${i ? 65 : 82}%, ${(1 - tk) * (i ? 0.5 : 0.85)})`;
    c.lineWidth = i ? 3 : 1.5;
    c.stroke();
  });
}

function drawHitFxLightning(c, ef, t) {
  c.strokeStyle = `hsla(${ef.h}, 100%, 90%, ${1 - t})`;
  c.lineWidth = 2;
  c.lineJoin = 'round';
  const h = 8 + t * 10;
  c.beginPath();
  c.moveTo(ef.x - h * 0.4, ef.y + h * 0.35);
  c.lineTo(ef.x - h * 0.05, ef.y);
  c.lineTo(ef.x + h * 0.15, ef.y - h * 0.25);
  c.lineTo(ef.x + h * 0.35, ef.y + h * 0.4);
  c.stroke();
}

function drawHitFxByStyle(c, ef, t, age, style) {
  switch (style) {
    case 1: drawHitFxStar(c, ef, t, age); break;
    case 2: drawHitFxMultiRing(c, ef, t); break;
    case 3: drawHitFxSparks(c, ef, t); break;
    case 4: drawHitFxStreak(c, ef, t); break;
    case 5: drawHitFxPulse(c, ef, t); break;
    case 6: drawHitFxDiamond(c, ef, t); break;
    case 7: drawHitFxSpiral(c, ef, t, age); break;
    case 8: drawHitFxShock(c, ef, t); break;
    case 9: drawHitFxLightning(c, ef, t); break;
    default: drawHitFxRing(c, ef, t); break;
  }
}

function drawIntersectionEffects(now) {
  if (!anyShapeRunning()) return;
  const chainDur = 280;
  for (let i = hitFxChains.length - 1; i >= 0; i--) {
    const ch = hitFxChains[i];
    const age = now - ch.t0;
    if (age > chainDur) { hitFxChains.splice(i, 1); continue; }
    const a = 1 - age / chainDur;
    ctx.save();
    ctx.strokeStyle = `hsla(${ch.h}, 90%, 75%, ${a * 0.55})`;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(ch.x0, ch.y0);
    ctx.lineTo(ch.x1, ch.y1);
    ctx.stroke();
    ctx.restore();
  }
  if (!hitFxBursts.length) return;
  const dur = 420;
  for (let i = hitFxBursts.length - 1; i >= 0; i--) {
    const ef = hitFxBursts[i];
    const age = now - ef.t0;
    if (age > dur) { hitFxBursts.splice(i, 1); continue; }
    const t = age / dur;
    ctx.save();
    drawHitFxByStyle(ctx, ef, t, age, ef.style ?? 0);
    ctx.restore();
  }
}

function buildVisualFxThumb(styleId, size) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = size;
  const c = cv.getContext('2d');
  c.fillStyle = '#0b0c14';
  c.fillRect(0, 0, size, size);
  drawHitFxByStyle(c, { x: size / 2, y: size / 2, h: 200 }, 0.38, 140, styleId);
  return cv;
}

function soundThumbSample(u, styleId) {
  const t = u * 3.2;
  switch (styleId) {
    case 1:
      return Math.sin(t * 2.2) * Math.exp(-t * 1.1)
        + Math.sin(t * 4.4) * Math.exp(-t * 2) * 0.45;
    case 2:
      return t < 0.35 ? Math.sin(t * 9) * Math.exp(-t * 14) : 0;
    case 3:
      return Math.sin(t * 3) * Math.exp(-t * 4.5);
    case 4:
      return Math.sin(t * 1.6) * Math.exp(-t * 1.4) * 0.85;
    case 5: {
      const p1 = Math.exp(-Math.pow((u - 0.22) * 14, 2));
      const p2 = Math.exp(-Math.pow((u - 0.5) * 14, 2));
      const p3 = Math.exp(-Math.pow((u - 0.78) * 14, 2));
      return (p1 + p2 * 0.9 + p3 * 0.85) * 0.9;
    }
    case 6:
      return Math.sin(t * 1.8) * Math.exp(-t * 1.6) * 0.75
        + Math.sin(t * 2.8) * Math.exp(-t * 2.2) * 0.25;
    case 7:
      return Math.sin(t * 3.5) * Math.exp(-t * 2.2)
        + Math.sin(t * 6) * Math.exp(-t * 3.5) * 0.35;
    case 8:
      return t < 0.2 ? 0.95 * Math.exp(-t * 22) : 0.08 * Math.exp(-(t - 0.2) * 6);
    case 9:
      return Math.sin(t * (1.2 + u * 2.8)) * Math.exp(-t * 1.3) * 0.8;
    default:
      return Math.sin(t * 2.5) * Math.exp(-t * 1.8)
        + Math.sin(t * 5) * Math.exp(-t * 3) * 0.2;
  }
}

function drawSoundFxThumbDecor(c, size, styleId) {
  const cx = size / 2;
  const cy = size / 2;
  const ink = 'rgba(175,215,255,0.85)';
  const dim = 'rgba(120,170,220,0.45)';
  c.save();
  switch (styleId) {
    case 0:
      c.fillStyle = dim;
      c.fillRect(cx - 7, cy + 5, 14, 2);
      c.beginPath();
      c.arc(cx, cy - 1, 3, 0, Math.PI * 2);
      c.fillStyle = ink;
      c.fill();
      break;
    case 1:
      c.strokeStyle = dim;
      c.lineWidth = 1;
      [6, 9].forEach(r => {
        c.beginPath();
        c.arc(cx, cy + 2, r, Math.PI * 1.15, Math.PI * 1.85);
        c.stroke();
      });
      c.beginPath();
      c.moveTo(cx - 4, cy - 5);
      c.lineTo(cx + 4, cy - 5);
      c.lineTo(cx + 3, cy + 1);
      c.lineTo(cx - 3, cy + 1);
      c.closePath();
      c.fillStyle = ink;
      c.fill();
      break;
    case 2:
      c.fillStyle = 'rgba(160,130,90,0.75)';
      c.fillRect(cx - 6, cy + 2, 12, 4);
      c.strokeStyle = ink;
      c.lineWidth = 1.5;
      c.beginPath();
      c.moveTo(cx, cy - 6);
      c.lineTo(cx, cy + 1);
      c.stroke();
      break;
    case 3:
      c.beginPath();
      c.arc(cx, cy, 5, 0, Math.PI * 2);
      c.fillStyle = 'rgba(180,220,255,0.25)';
      c.fill();
      c.strokeStyle = ink;
      c.lineWidth = 1.2;
      c.stroke();
      break;
    case 4:
      c.fillStyle = 'rgba(140,180,230,0.5)';
      c.fillRect(cx - 9, cy + 4, 18, 3);
      c.fillRect(cx - 7, cy + 1, 14, 2);
      c.fillStyle = ink;
      c.beginPath();
      c.arc(cx, cy - 3, 2.5, 0, Math.PI * 2);
      c.fill();
      break;
    case 5:
      c.strokeStyle = ink;
      c.lineWidth = 1.2;
      c.lineCap = 'round';
      [-6, 0, 6].forEach(dx => {
        c.beginPath();
        c.moveTo(cx + dx, cy + 6);
        c.lineTo(cx + dx, cy - 5);
        c.stroke();
      });
      c.fillStyle = dim;
      [-6, 0, 6].forEach(dx => {
        c.beginPath();
        c.arc(cx + dx, cy - 6, 2, 0, Math.PI * 2);
        c.fill();
      });
      break;
    case 6:
      c.strokeStyle = dim;
      c.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        c.beginPath();
        c.moveTo(cx - 8 + i * 5, cy + 4);
        c.quadraticCurveTo(cx - 5 + i * 5, cy - 6, cx - 2 + i * 5, cy + 2);
        c.stroke();
      }
      break;
    case 7:
      c.fillStyle = ink;
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI * 2 - Math.PI / 2;
        c.beginPath();
        c.arc(cx + Math.cos(a) * 7, cy + Math.sin(a) * 7, 1.2, 0, Math.PI * 2);
        c.fill();
      }
      c.beginPath();
      c.arc(cx, cy, 2.5, 0, Math.PI * 2);
      c.fill();
      break;
    case 8:
      c.fillStyle = 'rgba(150,120,85,0.7)';
      c.beginPath();
      c.arc(cx + 5, cy + 5, 3, 0, Math.PI * 2);
      c.fill();
      c.strokeStyle = ink;
      c.lineWidth = 1.3;
      c.beginPath();
      c.moveTo(cx - 6, cy - 5);
      c.lineTo(cx + 2, cy + 3);
      c.stroke();
      break;
    case 9:
      c.strokeStyle = ink;
      c.lineWidth = 1.2;
      c.lineCap = 'round';
      c.beginPath();
      c.moveTo(cx - 8, cy + 5);
      c.quadraticCurveTo(cx - 2, cy - 2, cx + 8, cy - 6);
      c.stroke();
      c.fillStyle = dim;
      c.beginPath();
      c.moveTo(cx + 8, cy - 6);
      c.lineTo(cx + 10, cy - 4);
      c.lineTo(cx + 8, cy - 2);
      c.closePath();
      c.fill();
      break;
    default:
      break;
  }
  c.restore();
}

function buildSoundFxThumb(styleId, size) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = size;
  const c = cv.getContext('2d');
  c.fillStyle = '#0b0c14';
  c.fillRect(0, 0, size, size);
  const mid = size / 2;
  const amp = size * 0.22;
  const pad = 3;
  const waveFill = 'rgba(100,160,220,0.12)';
  const waveStroke = 'rgba(160,210,255,0.8)';

  c.beginPath();
  for (let i = 0; i <= 32; i++) {
    const u = i / 32;
    const x = pad + u * (size - pad * 2);
    const y = mid + soundThumbSample(u, styleId) * amp;
    if (i === 0) c.moveTo(x, y);
    else c.lineTo(x, y);
  }
  c.lineTo(size - pad, size - pad);
  c.lineTo(pad, size - pad);
  c.closePath();
  c.fillStyle = waveFill;
  c.fill();

  c.beginPath();
  for (let i = 0; i <= 32; i++) {
    const u = i / 32;
    const x = pad + u * (size - pad * 2);
    const y = mid + soundThumbSample(u, styleId) * amp;
    if (i === 0) c.moveTo(x, y);
    else c.lineTo(x, y);
  }
  c.strokeStyle = waveStroke;
  c.lineWidth = 1.3;
  c.lineCap = 'round';
  c.lineJoin = 'round';
  c.stroke();

  drawSoundFxThumbDecor(c, size, styleId);
  return cv;
}

function ensureFxStyleThumbs() {
  if (fxStyleThumbsReady) return;
  const sz = 34;
  VISUAL_FX_STYLES.forEach(s => { s.thumb = buildVisualFxThumb(s.id, sz); });
  SOUND_FX_STYLES.forEach(s => { s.thumb = buildSoundFxThumb(s.id, sz); });
  fxStyleThumbsReady = true;
}

function worldSpan() {
  const hw = W / (2 * view.scale), hh = H / (2 * view.scale);
  return { x0: view.panX - hw, x1: view.panX + hw, y0: view.panY - hh, y1: view.panY + hh };
}

function drawGrid() {
  const MINOR = 50, MAJOR = 100;
  const { x0, x1, y0, y1 } = worldSpan();
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,.28)';
  ctx.lineWidth = 1;
  const xStart = Math.floor(x0 / MINOR) * MINOR;
  const yStart = Math.floor(y0 / MINOR) * MINOR;
  for (let x = xStart; x <= x1; x += MINOR) {
    if (x % MAJOR === 0) continue;
    ctx.beginPath(); ctx.moveTo(wx(x), 0); ctx.lineTo(wx(x), H); ctx.stroke();
  }
  for (let y = yStart; y <= y1; y += MINOR) {
    if (y % MAJOR === 0) continue;
    ctx.beginPath(); ctx.moveTo(0, wy(y)); ctx.lineTo(W, wy(y)); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(255,255,255,.52)';
  ctx.fillStyle = '#fff';
  ctx.font = '8px Menlo,monospace';
  for (let x = Math.floor(x0 / MAJOR) * MAJOR; x <= x1; x += MAJOR) {
    if (Math.abs(x) < 1e-6) continue;
    ctx.beginPath(); ctx.moveTo(wx(x), 0); ctx.lineTo(wx(x), H); ctx.stroke();
    ctx.fillText(String(Math.round(x)), wx(x) + 2, wy(0) - 3);
  }
  for (let y = Math.floor(y0 / MAJOR) * MAJOR; y <= y1; y += MAJOR) {
    if (Math.abs(y) < 1e-6) continue;
    ctx.beginPath(); ctx.moveTo(0, wy(y)); ctx.lineTo(W, wy(y)); ctx.stroke();
    ctx.fillText(String(Math.round(y)), wx(0) + 3, wy(y) - 2);
  }
  ctx.restore();
}

function drawAxes() {
  ctx.save();
  ctx.lineWidth = 1;
  ctx.strokeStyle = 'rgba(255,100,100,.35)';
  ctx.beginPath(); ctx.moveTo(0, wy(0)); ctx.lineTo(W, wy(0)); ctx.stroke();
  ctx.strokeStyle = 'rgba(100,220,100,.35)';
  ctx.beginPath(); ctx.moveTo(wx(0), 0); ctx.lineTo(wx(0), H); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,.55)';
  const TICK = 50;
  const { x0, x1, y0, y1 } = worldSpan();
  for (let x = Math.floor(x0 / TICK) * TICK; x <= x1; x += TICK) {
    ctx.beginPath(); ctx.moveTo(wx(x), wy(0) - 3); ctx.lineTo(wx(x), wy(0) + 3); ctx.stroke();
  }
  for (let y = Math.floor(y0 / TICK) * TICK; y <= y1; y += TICK) {
    ctx.beginPath(); ctx.moveTo(wx(0) - 3, wy(y)); ctx.lineTo(wx(0) + 3, wy(y)); ctx.stroke();
  }
  ctx.fillStyle = '#fff';
  ctx.font = '9px Menlo,monospace';
  ctx.fillText('0', wx(0) + 4, wy(0) - 4);
  ctx.fillStyle = '#fff';
  ctx.fillText('x', W - 12, wy(0) - 5);
  ctx.fillStyle = '#fff';
  ctx.fillText('y', wx(0) + 5, 12);
  ctx.restore();
}

// ─── Drag state ──────────────────────────────────────────────────────
let drag = null;

function shapeWorldPointAt(s, lx, ly, fx, fy) {
  const ca = Math.cos(s.angle), sa = Math.sin(s.angle);
  const { px, py } = s;
  return {
    x: px + (fx + lx - px) * ca - (fy + ly - py) * sa,
    y: py + (fx + lx - px) * sa + (fy + ly - py) * ca,
  };
}

function shapeWorldPoint(s, lx, ly) {
  return shapeWorldPointAt(s, lx, ly, s.fx, s.fy);
}

function centerWorldAt(s, fx, fy) {
  return shapeWorldPointAt(s, 0, 0, fx, fy);
}

function pivotScreen(s) {
  return { pxc: wx(s.px), pyc: wy(s.py) };
}

function drawParabolaHandles(s, idx) {
  if (!isParabolaShape(s) || idx !== activeTabIdx) return;
  const w = parabolaWorldPoints(s);
  if (!w) return;
  const { hue } = s;
  [[w.p0, 4], [w.p2, 4]].forEach(([p, r]) => {
    ctx.beginPath();
    ctx.arc(wx(p.x), wy(p.y), r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue}, 70%, 58%, .75)`;
    ctx.fill();
  });
  ctx.beginPath();
  ctx.arc(wx(w.p1.x), wy(w.p1.y), 7, 0, Math.PI * 2);
  ctx.fillStyle = `hsla(${hue}, 90%, 75%, .95)`;
  ctx.fill();
  ctx.strokeStyle = `hsla(${hue}, 95%, 92%, .8)`;
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawHandles() {
  shapes.forEach((s, idx)=>{
    if(!s.visible) return;
    const {hue}=s;
    const {pxc,pyc}=pivotScreen(s);
    ctx.beginPath(); ctx.arc(pxc,pyc,5,0,Math.PI*2);
    ctx.strokeStyle=`hsla(${hue},60%,65%,.8)`; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pxc-9,pyc); ctx.lineTo(pxc+9,pyc);
    ctx.moveTo(pxc,pyc-9); ctx.lineTo(pxc,pyc+9);
    ctx.lineWidth=1; ctx.stroke();

    drawParabolaHandles(s, idx);

    getDupCenters(s).forEach(c => {
      const f = centerWorldAt(s, c.fx, c.fy);
      const fxc = wx(f.x), fyc = wy(f.y);
      ctx.save();
      ctx.setLineDash([3,5]);
      ctx.strokeStyle=`hsla(${hue},50%,60%,${c.primary ? .35 : .2})`; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(pxc,pyc); ctx.lineTo(fxc,fyc); ctx.stroke();
      ctx.restore();
      const r = c.primary ? 6 : 4;
      ctx.beginPath(); ctx.arc(fxc,fyc,r,0,Math.PI*2);
      if (c.primary) {
        ctx.fillStyle=`hsla(${hue},85%,68%,.95)`; ctx.fill();
        ctx.strokeStyle=`hsla(${hue},95%,90%,.7)`; ctx.lineWidth=1.5; ctx.stroke();
      } else {
        ctx.fillStyle=`hsla(${hue},70%,55%,.45)`; ctx.fill();
      }
    });
  });
}

// ─── Render loop ─────────────────────────────────────────────────────
function getXf(s) {
  if (!s.pts || !s.visible) return { instances: [] };
  const instances = [];
  getDupCenters(s).forEach(({ fx, fy }) => {
    const wpts = s.pts.map(p => p ? shapeWorldPointAt(s, p.x, p.y, fx, fy) : null);
    const pts = wpts.map(p => p ? { x: wx(p.x), y: wy(p.y) } : null);
    const segs = [];
    for (let i = 0; i < wpts.length - 1; i++) {
      if (wpts[i] && wpts[i + 1]) segs.push([wpts[i], wpts[i + 1]]);
    }
    instances.push({ pts, segs, wpts });
  });
  return { instances };
}

let lastT = null;
function recordIntersections() {
  const xf = shapes.map(s => getXf(s));
  PAIRS.forEach(({ i, j, h, enabled }) => {
    if (!enabled || !shapes[i].visible || !shapes[j].visible) return;
    const key = pairKey(i, j);
    xf[i].instances.forEach(instI => xf[j].instances.forEach(instJ => {
      instI.segs.forEach(sa => instJ.segs.forEach(sb => {
        const p = segX(sa[0], sa[1], sb[0], sb[1]);
        if (p) appendTrail(key, h, { x: p.x, y: p.y }, false);
      }));
    }));
  });
}

function runSimulation(durationSec) {
  clearTrails();
  shapes.forEach(s => { s.angle = 0; s.paused = false; });
  const dt = 1 / 60;
  const steps = Math.ceil(durationSec / dt);
  const mul = speedMul;
  for (let step = 0; step < steps; step++) {
    shapes.forEach(s => { s.angle += s.speed * mul * dt; });
    recordIntersections();
    if (!batchNoFade) fadeTrailLayer(dt);
  }
  redrawAllTrails();
}

function trailOnlyPngUint8() {
  const cv = document.createElement('canvas');
  cv.width = W;
  cv.height = H;
  const c = cv.getContext('2d');
  c.fillStyle = '#080810';
  c.fillRect(0, 0, W, H);
  c.drawImage(trailCv, 0, 0);
  return dataUrlToUint8(cv.toDataURL('image/png'));
}

function dataUrlToUint8(dataUrl) {
  const b64 = dataUrl.split(',')[1];
  const bin = atob(b64);
  const u8 = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return u8;
}

function buildOmegaList(min, max, step) {
  const list = [];
  const iMin = Math.round(min / step);
  const iMax = Math.round(max / step);
  for (let i = iMin; i <= iMax; i++) {
    list.push(Math.round(i * step * 1000) / 1000);
  }
  return list;
}

function cartesianOmegaAssignments(omegaList) {
  const lists = shapes.map(() => omegaList);
  const out = [];
  const idx = new Array(lists.length).fill(0);
  if (!lists.length) return out;
  while (true) {
    out.push(idx.map((k, dim) => lists[dim][k]));
    let dim = lists.length - 1;
    while (dim >= 0) {
      idx[dim]++;
      if (idx[dim] < lists[dim].length) break;
      idx[dim] = 0;
      dim--;
    }
    if (dim < 0) break;
  }
  return out;
}

function omegaSpeedTag(v) {
  const n = Math.abs(v);
  const s = (Math.round(n * 10) / 10).toFixed(1).replace('.', '_');
  return (v < 0 ? 'm' : 'p') + s;
}

function batchBaseName(index, speeds) {
  const parts = speeds.map((v, i) => `s${i}${omegaSpeedTag(v)}`);
  return `batch_${String(index).padStart(5, '0')}_${parts.join('_')}`;
}

let batchStartTime = 0;

function setBatchProgress(done, total, msg) {
  const el = document.getElementById('batchProgress');
  const bar = document.getElementById('batchProgressBar');
  const pct = total > 0 ? ((done / total) * 100).toFixed(1) : '0';
  let elapsed = '';
  if (batchStartTime) {
    const sec = (Date.now() - batchStartTime) / 1000;
    elapsed = sec >= 60
      ? ` · 経過 ${Math.floor(sec / 60)}分${Math.floor(sec % 60)}秒`
      : ` · 経過 ${sec.toFixed(0)}秒`;
  }
  const core = msg || `処理中 ${done} / ${total}（${pct}%）${elapsed}`;
  if (el) el.textContent = core;
  if (bar) {
    bar.max = total || 1;
    bar.value = done;
  }
}

async function runOmegaBatchExport() {
  if (batchActive) return;
  const min = parseFloat(document.getElementById('batchOmegaMin')?.value);
  const max = parseFloat(document.getElementById('batchOmegaMax')?.value);
  const step = parseFloat(document.getElementById('batchOmegaStep')?.value);
  const durationSec = parseFloat(document.getElementById('batchDuration')?.value);
  if (![min, max, step, durationSec].every(Number.isFinite) || step <= 0 || max < min || durationSec <= 0) {
    alert('ω範囲・刻み・秒数を正しく入力してください');
    return;
  }
  if (shapes.some(s => s.error || !s.pts)) {
    alert('式エラーの図形があるためバッチできません');
    return;
  }
  const omegaList = buildOmegaList(min, max, step);
  const assignments = cartesianOmegaAssignments(omegaList);
  const total = assignments.length;
  if (total > 20000) {
    alert(`組み合わせが ${total} 通りあり多すぎます（上限 20000）`);
    return;
  }
  const est = `図形 ${shapes.length} 個 × ω ${omegaList.length} 通り = ${total} パターン\n` +
    `各 ${durationSec} 秒シミュレート（軌跡のみ PNG + 同名 JSON）\nZIP で一括ダウンロードします。`;
  if (total > 2500) {
    if (!confirm(est + '\n\n数時間かかる場合があります。続行しますか？')) return;
  } else if (!confirm(est + '\n\n続行しますか？')) return;

  batchActive = true;
  batchCancel = false;
  batchNoFade = true;
  const savedSpeeds = shapes.map(s => s.speed);
  const zipEntries = {};
  const btn = document.getElementById('batchExportBtn');
  const cancelBtn = document.getElementById('batchCancelBtn');
  if (btn) { btn.disabled = true; btn.textContent = '実行中…'; }
  if (cancelBtn) cancelBtn.disabled = false;

  batchStartTime = Date.now();
  setBatchProgress(0, total, `開始しました（全 ${total} パターン）`);
  await new Promise(r => setTimeout(r, 0));

  try {
    for (let i = 0; i < total; i++) {
      if (batchCancel) break;
      const speeds = assignments[i];
      speeds.forEach((w, si) => { shapes[si].speed = w; });
      runSimulation(durationSec);
      const base = batchBaseName(i, speeds);
      zipEntries[base + '.png'] = trailOnlyPngUint8();
      const snap = settingsSnapshot();
      snap.batch = {
        index: i,
        speeds: speeds.map((w, si) => ({ shape: si, omega: w })),
        durationSec,
        omegaRange: { min, max, step },
      };
      zipEntries[base + '.json'] = fflate.strToU8(JSON.stringify(snap, null, 2));
      setBatchProgress(i + 1, total,
        `シミュレート中 ${i + 1} / ${total} · ω: ${speeds.map(w => w.toFixed(1)).join(', ')}`);
      await new Promise(r => setTimeout(r, 0));
    }
    if (batchCancel) {
      setBatchProgress(0, 1, 'キャンセルしました');
      return;
    }
    setBatchProgress(total, total, 'ZIP を作成中…');
    await new Promise(r => setTimeout(r, 0));
    const zipBytes = fflate.zipSync(zipEntries);
    downloadBlob(new Blob([zipBytes], { type: 'application/zip' }),
      'locus-omega-batch-' + Date.now() + '.zip');
    setBatchProgress(total, total, `完了: ${total} パターン`);
  } catch (err) {
    console.error(err);
    alert('バッチ書き出し失敗: ' + (err && err.message ? err.message : String(err)));
    setBatchProgress(0, 1, 'エラー');
  } finally {
    shapes.forEach((s, si) => { s.speed = savedSpeeds[si]; });
    batchNoFade = false;
    batchActive = false;
    batchCancel = false;
    clearTrails();
    shapes.forEach(s => { s.angle = 0; });
    if (btn) { btn.disabled = false; btn.textContent = 'バッチ ZIP 書き出し'; }
    if (cancelBtn) cancelBtn.disabled = true;
    batchStartTime = 0;
  }
}

function frame(ts) {
  if (batchActive) { requestAnimationFrame(frame); return; }
  if (!lastT) { lastT = ts; requestAnimationFrame(frame); return; }
  const dt = Math.min((ts - lastT) * 0.001, 0.05);
  lastT = ts;
  shapes.forEach(s => { if (!s.paused) s.angle += s.speed * speedMul * dt; });

  if (viewDirty) { redrawAllTrails(); viewDirty = false; }

  const xf = shapes.map(s => getXf(s));

  const hits = [];
  PAIRS.forEach(({ i, j, h, enabled }) => {
    if (!enabled || !shapes[i].visible || !shapes[j].visible) return;
    const key = pairKey(i, j);
    xf[i].instances.forEach(instI => xf[j].instances.forEach(instJ => {
      instI.segs.forEach(sa => instJ.segs.forEach(sb => {
        const p = segX(sa[0], sa[1], sb[0], sb[1]);
        if (p) {
          const sx = wx(p.x), sy = wy(p.y);
          hits.push({ x: sx, y: sy, wx: p.x, wy: p.y, h, i, j, key });
          notifyIntersectionHit(key, sx, sy, h, p.x, p.y);
          appendTrail(key, h, { x: p.x, y: p.y });
        }
      }));
    }));
  });

  fadeTrailLayer(dt);


  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, W, H);
  ctx.drawImage(trailCv, 0, 0);
  if (showGrid) drawGrid();
  if (showAxes) drawAxes();

  xf.forEach(({ instances }, i) => {
    if (!shapes[i].visible) return;
    const { hue } = shapes[i];
    ctx.strokeStyle = `hsl(${hue},74%,57%)`;
    ctx.lineWidth = 1.5;
    instances.forEach(({ pts }) => {
      ctx.beginPath();
      let pen = false;
      pts.forEach(p => {
        if (p) { if (!pen) { ctx.moveTo(p.x, p.y); pen = true; } else ctx.lineTo(p.x, p.y); }
        else pen = false;
      });
      ctx.stroke();
    });
  });
  drawHandles();

  hits.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3.2, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${p.h},100%,88%)`;
    ctx.fill();
  });
  drawIntersectionEffects(performance.now());

  captureRecordingFrame();

  requestAnimationFrame(frame);
}

// ─── Global presets ──────────────────────────────────────────────────
const GLOBAL_PRESET_SLOTS = [
  { slot: 1, name: 'no.1', icon: '①', storageKey: 'locus_global_preset_1' },
  { slot: 2, name: 'no.2', icon: '②', storageKey: 'locus_global_preset_2' },
  { slot: 3, name: 'no.3', icon: '③', storageKey: 'locus_global_preset_3' },
  { slot: 4, name: 'no.4', icon: '④', storageKey: 'locus_global_preset_4' },
];

const GLOBAL_PRESET_BUILTIN_SLOTS = new Set([1, 2, 3, 4]);

function getBuiltinGlobalSnapshot(slot) {
  const builtins = typeof window !== 'undefined' && window.BUILTIN_GLOBAL_SNAPSHOTS;
  const raw = builtins && (builtins[slot] || builtins[String(slot)]);
  if (raw) return JSON.parse(JSON.stringify(raw));
  return null;
}

function findSaveForGlobalSlot(slot) {
  const name = `no.${slot}`;
  return SAVES.find(sv => {
    const n = (sv.name || '').trim();
    return n === name || n.toLowerCase() === name;
  });
}

function syncGlobalPresetsFromNamedSaves() {
  GLOBAL_PRESET_SLOTS.forEach(def => {
    const sv = findSaveForGlobalSlot(def.slot);
    if (!sv || !sv.snap) return;
    try {
      localStorage.setItem(def.storageKey, JSON.stringify({
        version: 3,
        shapes: sv.snap,
      }));
    } catch (_) {}
  });
}

function resolveGlobalPresetData(slot) {
  const def = GLOBAL_PRESET_SLOTS.find(g => g.slot === slot);
  if (!def) return null;
  if (GLOBAL_PRESET_BUILTIN_SLOTS.has(slot)) {
    const builtin = getBuiltinGlobalSnapshot(slot);
    if (builtin && builtin.shapes && builtin.shapes.length) return builtin;
  }
  try {
    const raw = localStorage.getItem(def.storageKey);
    if (raw) {
      const data = JSON.parse(raw);
      if (data && data.shapes && data.shapes.length) return data;
    }
  } catch (_) {}
  const sv = findSaveForGlobalSlot(slot);
  if (sv && sv.snap && sv.snap.length) {
    return { version: 3, shapes: sv.snap };
  }
  return getBuiltinGlobalSnapshot(slot);
}

function seedBuiltinGlobalPresets() {
  GLOBAL_PRESET_SLOTS.forEach(def => {
    const snap = getBuiltinGlobalSnapshot(def.slot);
    if (!snap) return;
    try {
      if (!localStorage.getItem(def.storageKey)) {
        localStorage.setItem(def.storageKey, JSON.stringify(snap));
      }
    } catch (_) {}
  });
}

function globalPresetThumbSimDuration(data) {
  if (typeof data.trailDurationSec === 'number' && data.trailDurationSec > 0) {
    return data.trailDurationSec;
  }
  return 20;
}

function captureAppStateForThumb() {
  return {
    shapes: shapeSnapshot(),
    view: { scale: view.scale, panX: view.panX, panY: view.panY },
    speedMul,
    trailWidth,
    trailDurationSec,
    pairs: PAIRS.map(p => ({ i: p.i, j: p.j, enabled: p.enabled, h: p.h })),
    trails: clonePairTrails(),
    activeTabIdx,
  };
}

function applyPresetSnapshotForThumb(data) {
  shapes.length = 0;
  data.shapes.forEach(d => shapes.push(makeShape(d)));
  collapseLegacyDupTabs();
  if (data.view) {
    view.scale = data.view.scale ?? 1;
    view.panX = data.view.panX ?? 0;
    view.panY = data.view.panY ?? 0;
  }
  if (typeof data.speedMul === 'number') speedMul = data.speedMul;
  if (typeof data.trailWidth === 'number') trailWidth = data.trailWidth;
  if (typeof data.trailDurationSec === 'number') trailDurationSec = data.trailDurationSec;
  PAIRS = computePairs();
  if (data.pairs) {
    data.pairs.forEach(p => {
      const pr = PAIRS.find(x => x.i === p.i && x.j === p.j);
      if (pr) pr.enabled = p.enabled !== false;
    });
  }
}

function restoreAppStateForThumb(saved) {
  shapes.length = 0;
  saved.shapes.forEach(d => shapes.push(makeShape(d)));
  collapseLegacyDupTabs();
  view.scale = saved.view.scale;
  view.panX = saved.view.panX;
  view.panY = saved.view.panY;
  speedMul = saved.speedMul;
  trailWidth = saved.trailWidth;
  trailDurationSec = saved.trailDurationSec;
  PAIRS = computePairs();
  saved.pairs.forEach(p => {
    const pr = PAIRS.find(x => x.i === p.i && x.j === p.j);
    if (pr) pr.enabled = p.enabled !== false;
  });
  restorePairTrails(saved.trails);
  activeTabIdx = Math.max(0, Math.min(saved.activeTabIdx, shapes.length - 1));
  viewDirty = true;
  redrawAllTrails();
}

/** シミュレーション後の trailCv から軌跡のみを切り出し（wx/wy と同じ画面向き） */
function captureTrailThumbFromCanvas(size, trailsSrc) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = size;
  const c = cv.getContext('2d');
  c.fillStyle = '#0c0c18';
  c.fillRect(0, 0, size, size);

  const screenPts = [];
  PAIRS.forEach(({ i, j, enabled }) => {
    if (!enabled || !shapes[i]?.visible || !shapes[j]?.visible) return;
    const st = trailsSrc[pairKey(i, j)];
    if (!st) return;
    st.tracks.forEach(tr => {
      tr.points.forEach(p => screenPts.push({ x: wx(p.x), y: wy(p.y) }));
    });
  });

  const drawFull = () => {
    const scale = Math.min(size / W, size / H);
    const dw = W * scale;
    const dh = H * scale;
    c.drawImage(trailCv, 0, 0, W, H, (size - dw) / 2, (size - dh) / 2, dw, dh);
  };

  if (screenPts.length < 2) {
    drawFull();
    return cv;
  }

  let x0 = Infinity, x1 = -Infinity, y0 = Infinity, y1 = -Infinity;
  screenPts.forEach(p => {
    x0 = Math.min(x0, p.x); x1 = Math.max(x1, p.x);
    y0 = Math.min(y0, p.y); y1 = Math.max(y1, p.y);
  });
  const span = Math.max(x1 - x0, y1 - y0, 1);
  const pad = Math.max(10, span * 0.12);
  x0 = Math.max(0, Math.floor(x0 - pad));
  y0 = Math.max(0, Math.floor(y0 - pad));
  x1 = Math.min(W, Math.ceil(x1 + pad));
  y1 = Math.min(H, Math.ceil(y1 + pad));
  const sw = Math.max(1, x1 - x0);
  const sh = Math.max(1, y1 - y0);
  const scale = Math.min(size / sw, size / sh);
  const dw = sw * scale;
  const dh = sh * scale;
  c.drawImage(trailCv, x0, y0, sw, sh, (size - dw) / 2, (size - dh) / 2, dw, dh);
  return cv;
}

const GLOBAL_THUMB_RENDER_SIZE = 168;
const GLOBAL_THUMB_DISPLAY_SIZE = 48;

function buildGlobalPresetThumb(data) {
  const empty = () => {
    const cv = document.createElement('canvas');
    cv.width = cv.height = GLOBAL_THUMB_DISPLAY_SIZE;
    const c = cv.getContext('2d');
    c.fillStyle = '#0c0c18';
    c.fillRect(0, 0, GLOBAL_THUMB_DISPLAY_SIZE, GLOBAL_THUMB_DISPLAY_SIZE);
    return cv;
  };
  if (!data || !data.shapes || !data.shapes.length) return empty();

  const saved = captureAppStateForThumb();
  const simSec = globalPresetThumbSimDuration(data);
  const savedBatchNoFade = batchNoFade;
  try {
    applyPresetSnapshotForThumb(data);
    batchNoFade = true;
    trailWidth = Math.max(10, (data.trailWidth || trailWidth || 5) * 2.4);
    runSimulation(simSec);
    redrawAllTrails();
    const hi = captureTrailThumbFromCanvas(GLOBAL_THUMB_RENDER_SIZE, clonePairTrails());
    const cv = document.createElement('canvas');
    cv.width = cv.height = GLOBAL_THUMB_DISPLAY_SIZE;
    const c = cv.getContext('2d');
    c.fillStyle = '#0c0c18';
    c.fillRect(0, 0, GLOBAL_THUMB_DISPLAY_SIZE, GLOBAL_THUMB_DISPLAY_SIZE);
    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = 'high';
    c.drawImage(
      hi, 0, 0, GLOBAL_THUMB_RENDER_SIZE, GLOBAL_THUMB_RENDER_SIZE,
      0, 0, GLOBAL_THUMB_DISPLAY_SIZE, GLOBAL_THUMB_DISPLAY_SIZE,
    );
    return cv;
  } catch (_) {
    return empty();
  } finally {
    batchNoFade = savedBatchNoFade;
    restoreAppStateForThumb(saved);
  }
}

function initGlobalPresetThumbs() {
  GLOBAL_PRESET_SLOTS.forEach(def => {
    def._thumbSrc = buildGlobalPresetThumb(resolveGlobalPresetData(def.slot)).toDataURL('image/png');
  });
}

function loadGlobalPresetSlot(slot) {
  const data = resolveGlobalPresetData(slot);
  if (!data || !data.shapes || !data.shapes.length) return;
  clearSimHistory();
  const hasFullSettings = data.view || data.pairs || data.speedMul !== undefined
    || data.trailWidth !== undefined || data.trailDurationSec !== undefined
    || data.showGrid !== undefined || data.showAxes !== undefined;
  if (hasFullSettings) {
    applySettingsSnapshot(data);
  } else {
    shapes.length = 0;
    data.shapes.forEach(d => shapes.push(makeShape(d)));
    collapseLegacyDupTabs();
    PAIRS = computePairs();
    activeTabIdx = 0;
    clearTrails();
    buildUI();
  }
  resetPlaybackAfterPreset();
}

function renderGlobalPresets() {
  const area = document.getElementById('global-presets');
  if (!area) return;
  area.innerHTML = '';
  GLOBAL_PRESET_SLOTS.forEach(def => {
    const btn = document.createElement('button');
    btn.className = 'gp-btn';
    const img = document.createElement('img');
    img.className = 'gp-thumb';
    img.alt = '';
    img.src = def._thumbSrc || buildGlobalPresetThumb(resolveGlobalPresetData(def.slot)).toDataURL('image/png');
    btn.appendChild(img);
    const label = document.createElement('span');
    label.className = 'gp-label-row';
    label.innerHTML = `<span class="gp-icon">${def.icon}</span><span>${def.name}</span>`;
    btn.appendChild(label);
    btn.title = def.name;
    btn.addEventListener('click', () => loadGlobalPresetSlot(def.slot));
    area.appendChild(btn);
  });
}

// ─── Saves ───────────────────────────────────────────────────────────
const SAVES = [];

function persistSaves() {
  try {
    localStorage.setItem('locus_saves', JSON.stringify(
      SAVES.map(sv=>({name:sv.name, thumb:sv.thumb, snap:sv.snap, isInitial:sv.isInitial||false}))
    ));
  } catch(e) {}
}

function loadPersistedSaves() {
  try {
    const data = localStorage.getItem('locus_saves');
    if(!data) return;
    JSON.parse(data).forEach(sv=>SAVES.push(sv));
  } catch(e) {}
}

function shapeSnapshot() {
  return shapes.map(s => ({
    formula: s.formula, tMinS: s.tMinS, tMaxS: s.tMaxS, N: s.N,
    fx: s.fx, fy: s.fy, px: s.px, py: s.py,
    speed: s.speed, hue: s.hue, angle: s.angle,
    visible: s.visible, paused: s.paused,
    dupCount: dupCountOf(s),
    curveKind: s.curveKind || 'formula',
    parabola: s.parabola ? {
      p0: { ...s.parabola.p0 },
      p1: { ...s.parabola.p1 },
      p2: { ...s.parabola.p2 },
    } : undefined,
    parabolaTMin: s.parabolaTMin,
    parabolaTMax: s.parabolaTMax,
  }));
}

/** 画面の全設定（図形・表示・軌跡・ペアなど） */
function settingsSnapshot() {
  return {
    version: 3,
    exportedAt: new Date().toISOString(),
    shapes: shapeSnapshot(),
    view: { scale: view.scale, panX: view.panX, panY: view.panY },
    speedMul,
    trailWidth,
    trailDurationSec,
    showGrid,
    showAxes,
    intersectionVisualEnabled,
    intersectionSoundEnabled,
    intersectionVisualStyle,
    intersectionSoundStyle,
    activeTabIdx,
    pairs: PAIRS.map(p => ({
      i: p.i, j: p.j, enabled: p.enabled, h: p.h,
      fx: getPairFx(pairKey(p.i, p.j)),
    })),
  };
}

function applySettingsSnapshot(data) {
  if (!data.shapes || !Array.isArray(data.shapes)) throw new Error('shapes がありません');
  shapes.length = 0;
  data.shapes.forEach(d => shapes.push(makeShape(d)));
  collapseLegacyDupTabs();
  if (data.view) {
    view.scale = data.view.scale ?? 1;
    view.panX = data.view.panX ?? 0;
    view.panY = data.view.panY ?? 0;
  }
  if (typeof data.speedMul === 'number') speedMul = data.speedMul;
  if (typeof data.trailWidth === 'number') trailWidth = data.trailWidth;
  if (typeof data.trailDurationSec === 'number') trailDurationSec = data.trailDurationSec;
  if (typeof data.showGrid === 'boolean') showGrid = data.showGrid;
  if (typeof data.showAxes === 'boolean') showAxes = data.showAxes;
  if (typeof data.intersectionVisualEnabled === 'boolean') {
    intersectionVisualEnabled = data.intersectionVisualEnabled;
  } else if (typeof data.intersectionEffectsEnabled === 'boolean') {
    intersectionVisualEnabled = data.intersectionEffectsEnabled;
  }
  if (typeof data.intersectionSoundEnabled === 'boolean') {
    intersectionSoundEnabled = data.intersectionSoundEnabled;
  } else if (typeof data.intersectionEffectsEnabled === 'boolean') {
    intersectionSoundEnabled = data.intersectionEffectsEnabled;
  }
  if (data.intersectionVisualStyle !== undefined) {
    intersectionVisualStyle = clampFxStyle(data.intersectionVisualStyle, 9);
  }
  if (data.intersectionSoundStyle !== undefined) {
    intersectionSoundStyle = clampFxStyle(data.intersectionSoundStyle, 9);
  }
  syncPairFxDefaultsFromGlobals();
  persistTrailSettings();
  PAIRS = computePairs();
  if (data.pairs) {
    data.pairs.forEach(p => {
      const k = pairKey(p.i, p.j);
      const pr = PAIRS.find(x => x.i === p.i && x.j === p.j);
      if (pr) pr.enabled = p.enabled !== false;
      pairEnabledCache[k] = p.enabled !== false;
      if (p.fx && typeof p.fx === 'object') {
        pairFxCache[k] = {
          visualEnabled: p.fx.visualEnabled !== false,
          soundEnabled: p.fx.soundEnabled === true,
          visualStyle: clampFxStyle(p.fx.visualStyle, 9),
          soundStyle: clampFxStyle(p.fx.soundStyle, 9),
        };
      }
    });
  } else if (typeof data.intersectionEffectsEnabled === 'boolean') {
    PAIRS.forEach(p => {
      pairFxCache[pairKey(p.i, p.j)] = {
        visualEnabled: data.intersectionEffectsEnabled,
        soundEnabled: data.intersectionEffectsEnabled,
        visualStyle: intersectionVisualStyle,
        soundStyle: intersectionSoundStyle,
      };
    });
  }
  if (PAIRS.length && !selectedPairFxKey) {
    selectedPairFxKey = pairKey(PAIRS[0].i, PAIRS[0].j);
  }
  activeTabIdx = Math.max(0, Math.min(
    typeof data.activeTabIdx === 'number' ? data.activeTabIdx : 0,
    shapes.length - 1,
  ));
  clearTrails();
  viewDirty = true;
  buildUI();
}

function saveState(name) {
  const thumb = canvas.toDataURL('image/jpeg', 0.82);
  const snap  = shapeSnapshot();
  const saveName = name || ('保存 ' + (SAVES.length + 1));
  SAVES.push({ name: saveName, thumb, snap, isInitial: false });
  const slotM = /^no\.([1-4])$/i.exec(saveName.trim());
  if (slotM) {
    const def = GLOBAL_PRESET_SLOTS.find(g => g.slot === parseInt(slotM[1], 10));
    if (def) {
      try {
        localStorage.setItem(def.storageKey, JSON.stringify({ version: 3, shapes: snap }));
      } catch (_) {}
    }
  }
  persistSaves();
  renderSavesStrip();
}

function loadSave(snap) {
  shapes.length = 0;
  snap.forEach(d => shapes.push(makeShape(d)));
  collapseLegacyDupTabs();
  PAIRS = computePairs();
  activeTabIdx = 0;
  clearTrails();
  buildUI();
}

function renderSavesStrip() {
  const area = document.getElementById('saves-area');
  area.innerHTML = '';
  if(!SAVES.length) return;
  const lbl = document.createElement('div'); lbl.className='saves-hdr';
  lbl.textContent = '保存済み（クリックで復元 / ★ = 起動時に読込）';
  area.appendChild(lbl);
  const strip = document.createElement('div'); strip.className='saves-strip';
  SAVES.forEach((sv,idx)=>{
    const item = document.createElement('div'); item.className='save-item';
    const img  = document.createElement('img'); img.src=sv.thumb;
    const nameEl = document.createElement('div'); nameEl.className='save-name';
    nameEl.textContent = sv.name;
    const restoreHint = document.createElement('div'); restoreHint.className='save-restore';
    restoreHint.textContent = '復元';

    // ★ 起動時読込ボタン
    const homeBtn = document.createElement('button'); homeBtn.className='save-home'+(sv.isInitial?' active':'');
    homeBtn.textContent='★'; homeBtn.title='起動時にこの状態を読込';
    homeBtn.addEventListener('click', e=>{
      e.stopPropagation();
      const wasInitial = sv.isInitial;
      SAVES.forEach(s => { s.isInitial = false; });
      sv.isInitial = !wasInitial;
      persistSaves();
      renderSavesStrip();
    });

    // × 削除ボタン
    const del = document.createElement('button'); del.className='save-del';
    del.textContent='×';
    del.addEventListener('click', e=>{
      e.stopPropagation();
      SAVES.splice(idx,1); persistSaves(); renderSavesStrip();
    });

    item.appendChild(img);
    item.appendChild(restoreHint);
    item.appendChild(homeBtn);
    item.appendChild(del);
    item.appendChild(nameEl);
    item.addEventListener('click', ()=>loadSave(sv.snap));
    strip.appendChild(item);
  });
  area.appendChild(strip);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let activeTabIdx = 0;
let shapeDetailsExpanded = false;
let activateShapeTabFn = null;

function makeTransportOptBtn(text, active) {
  const b = document.createElement('button');
  b.type = 'button';
  b.className = 'reset-btn transport-opt-btn' + (active ? ' active-choice' : '');
  b.textContent = text;
  return b;
}

function setTransportOptPair(btnOn, btnOff, isOn) {
  btnOn.classList.toggle('active-choice', isOn);
  btnOff.classList.toggle('active-choice', !isOn);
}

function makeTransportUtilsLine(labelText, buttons) {
  const line = document.createElement('div');
  line.className = 'transport-utils-line';
  const lbl = document.createElement('span');
  lbl.className = 'transport-utils-lbl';
  lbl.textContent = labelText;
  const actions = document.createElement('div');
  actions.className = 'transport-utils-actions';
  buttons.forEach(b => actions.appendChild(b));
  line.append(lbl, actions);
  return line;
}

function makeFxStyleThumbBtn(style, active, onSelect) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'fx-style-btn' + (active ? ' active-choice' : '');
  btn.title = `${style.name} — ${style.desc}`;
  const thumb = document.createElement('canvas');
  thumb.className = 'fx-style-thumb';
  thumb.width = thumb.height = 34;
  if (style.thumb) thumb.getContext('2d').drawImage(style.thumb, 0, 0);
  const name = document.createElement('span');
  name.className = 'fx-style-name';
  name.textContent = style.name;
  btn.append(thumb, name);
  btn.addEventListener('click', () => onSelect(style.id));
  return btn;
}

function makeFxControlBlock(label, enabled, styleId, styles, onEnabled, onStyle) {
  ensureFxStyleThumbs();
  const block = document.createElement('div');
  block.className = 'transport-fx-block' + (enabled ? '' : ' fx-disabled');
  const onBtn = makeTransportOptBtn('ON', enabled);
  const offBtn = makeTransportOptBtn('OFF', !enabled);
  onBtn.title = `${label}エフェクトを有効`;
  offBtn.title = `${label}エフェクトを無効`;
  const patternRow = document.createElement('div');
  patternRow.className = 'transport-fx-patterns';
  const styleBtns = styles.map(s => makeFxStyleThumbBtn(s, s.id === styleId, onStyle));
  styleBtns.forEach(b => patternRow.appendChild(b));
  onBtn.addEventListener('click', () => onEnabled(true));
  offBtn.addEventListener('click', () => onEnabled(false));
  block.append(makeTransportUtilsLine(label, [onBtn, offBtn]), patternRow);
  return {
    block,
    sync(en, sid) {
      block.classList.toggle('fx-disabled', !en);
      setTransportOptPair(onBtn, offBtn, en);
      styleBtns.forEach((b, i) => b.classList.toggle('active-choice', styles[i].id === sid));
    },
  };
}

function bindCollapsibleToggle(hdrId, bodyId) {
  const hdr = document.getElementById(hdrId);
  const body = document.getElementById(bodyId);
  if (!hdr || !body) return;
  const sync = () => {
    const expanded = !body.classList.contains('is-collapsed');
    hdr.setAttribute('aria-expanded', String(expanded));
    const chev = hdr.querySelector('.chev');
    if (chev) chev.textContent = expanded ? '▼' : '▶';
  };
  hdr.addEventListener('click', () => {
    body.classList.toggle('is-collapsed');
    sync();
  });
  sync();
}

function openShapeFormulaEditor(shapeIdx) {
  if (activateShapeTabFn && activeTabIdx !== shapeIdx) activateShapeTabFn(shapeIdx);
  shapeDetailsExpanded = true;
  updateShapeDetailsExpanded();
  const fInp = document.getElementById(`f${shapeIdx}`);
  if (fInp) {
    fInp.focus();
    fInp.select();
  }
}

function updateShapeDetailsExpanded() {
  document.querySelectorAll('.details-tab').forEach(btn => {
    const card = btn.closest('.card-full');
    const isActive = card && card.classList.contains('active');
    const open = isActive && shapeDetailsExpanded;
    btn.classList.toggle('open', open);
    btn.setAttribute('aria-expanded', String(open));
    const chev = btn.querySelector('.details-tab-chev');
    if (chev) chev.textContent = open ? '▼' : '▶';
  });
  document.querySelectorAll('.card-details').forEach(details => {
    const card = details.closest('.card-full');
    const isActive = card && card.classList.contains('active');
    details.classList.toggle('expanded', isActive && shapeDetailsExpanded);
  });
}

function buildUI() {

      <div class="preset-strip" id="ps${i}"></div>

        カンマ<b>あり</b> → <b>x(t), y(t)</b> &nbsp;&nbsp;

      <div class="cf">

        <span class="sep">〜</span>
        <input type="text"   class="w60" id="tmax${i}" value="${esc(shape.tMaxS)}">

      </div>

      <div class="cf">
        <span class="cf-lbl">図形の中心 ●</span>
        <span class="sep">fx</span>
        <input type="number" class="w70" id="fx${i}" value="${shape.fx}" step="1">

        <input type="number" class="w70" id="fy${i}" value="${shape.fy}" step="1">
      </div>
      <div class="desc">数式座標の原点（複製時は配置の基準）　キャンバス上でドラッグ可</div>

      <div class="cf">
        <span class="cf-lbl">回転の軸 ⊕</span>
        <span class="sep">px</span>
        <input type="number" class="w70" id="px${i}" value="${shape.px}" step="1">
        <span class="sep" style="margin-left:8px">py</span>
        <input type="number" class="w70" id="py${i}" value="${shape.py}" step="1">
      </div>
      <div class="desc">
        この点を中心に回転　ドラッグ可 &nbsp;&nbsp;
        (0,0) = 中心　+x = 右　+y = 上
      </div>

    card.querySelector('.card-head').insertBefore(prev, card.querySelector('.card-head').firstChild);

    // ── Apply logic ──────────────────────────────────────────────
    function applyFormula(formula, tMinS, tMaxS, N) {
      const tMin=parseT(tMinS), tMax=parseT(tMaxS);
      shape.curveKind = 'formula';
      shape.parabola = null;
      Object.assign(shape, {formula, tMinS, tMaxS, tMin, tMax, N});
      document.getElementById(`f${i}`).value=formula;
      document.getElementById(`tmin${i}`).value=tMinS;
      document.getElementById(`tmax${i}`).value=tMaxS;
      document.getElementById(`n${i}`).value=N;
      const fInp=document.getElementById(`f${i}`);
      const errDiv=document.getElementById(`err${i}`);
      try {
        const {pts,isPolar}=compileCurve(formula,tMin,tMax,N);
        shape.pts=pts; shape.isPolar=isPolar; shape.error=null;
        fInp.classList.remove('ferr'); errDiv.style.display='none';
        document.getElementById(`ftag${i}`).textContent=isPolar?'polar':'param';
      } catch(e) {
        shape.error=e.message; shape.pts=null;
        fInp.classList.add('ferr'); errDiv.textContent=e.message; errDiv.style.display='';
      }
      updateShapeThumb(i);
      updateFormulaHint(i);
      resetTimingAndTrails();
    }

    function applyFromInputs() {
      const formula=document.getElementById(`f${i}`).value;
      const tMinS  =document.getElementById(`tmin${i}`).value;
      const tMaxS  =document.getElementById(`tmax${i}`).value;
      const N  =Math.max(5,parseInt(document.getElementById(`n${i}`).value)||250);
      const fx =parseFloat(document.getElementById(`fx${i}`).value);
      const fy =parseFloat(document.getElementById(`fy${i}`).value);
      const px =parseFloat(document.getElementById(`px${i}`).value);
      const py =parseFloat(document.getElementById(`py${i}`).value);
      const spd=parseFloat(document.getElementById(`spd${i}`).value);
      if(isFinite(fx)) shape.fx=fx;
      if(isFinite(fy)) shape.fy=fy;
      if(isFinite(px)) shape.px=px;
      if(isFinite(py)) shape.py=py;
      if(isFinite(spd)) shape.speed=spd;
      applyFormula(formula,tMinS,tMaxS,N);
    }

    card.querySelectorAll('input').forEach(inp=>{
      if (inp.id === `dup${i}`) return;
      if (inp.id && inp.id.startsWith('ps')) return;
      const onEdit = () => applyFromInputs();
      inp.addEventListener('change', onEdit);
      if (inp.type === 'number' || inp.type === 'text') inp.addEventListener('input', onEdit);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') { inp.blur(); applyFromInputs(); } });

    // ── Pause ────────────────────────────────────────────────────

      applyFromInputs();
      let n = parseInt(dupInp.value, 10);

    cardArea.appendChild(card);
    updateFormulaHint(i);

  // ── "+" tab ──────────────────────────────────────────────────────
  const addTab = document.createElement('button'); addTab.className='tab-add';

let mediaRecorder = null;
let recordStream = null;
let recordChunks = [];
let recordMime = 'video/webm';
let recordStartTime = 0;
let recordTimerId = null;
let isRecording = false;
let recMode = null; // 'webcodecs' | 'webm'

let videoEncoder = null;
let recMuxer = null;
let recFrameCount = 0;
let recEncoderConfig = null;
let mp4MuxerModule = null;
let ffmpegInstance = null;
let isProcessingRecording = false;

const AVC_CODEC_CANDIDATES = [
  'avc1.640028',
  'avc1.4D4028',
  'avc1.42001E',
];

function formatRecTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return m + ':' + String(s % 60).padStart(2, '0');
}

function setRecStatus(msg) {
  const el = document.getElementById('rec-status');
  if (el) el.textContent = msg ? ' · ' + msg : '';
}

function updateRecordUI(recording) {
  isRecording = recording;
  const ind = document.getElementById('rec-indicator');
  const startBtn = document.getElementById('recStartBtn');
  const stopBtn = document.getElementById('recStopBtn');
  if (ind) {
    ind.classList.toggle('active', recording || isProcessingRecording);
    ind.setAttribute('aria-hidden', (recording || isProcessingRecording) ? 'false' : 'true');
  }
  if (startBtn) startBtn.disabled = recording || isProcessingRecording;
  if (stopBtn) stopBtn.disabled = !recording;
  if (!recording && !isProcessingRecording && recordTimerId) {
    clearInterval(recordTimerId);
    recordTimerId = null;
    const t = document.getElementById('rec-time');
    if (t) t.textContent = '0:00';
    setRecStatus('');
  }
}

function tickRecTime() {
  const el = document.getElementById('rec-time');
  if (el && isRecording) el.textContent = formatRecTime(Date.now() - recordStartTime);
}

function downloadBlob(blob, filename) {
  const a = document.createElement('a');
  a.download = filename;
  a.href = URL.createObjectURL(blob);
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
}

function evenDim(n) { return Math.max(2, n & ~1); }

async function getMp4Muxer() {
  if (!mp4MuxerModule) {
    mp4MuxerModule = await import('./vendor/mp4-muxer/mp4-muxer.mjs');
  }
  return mp4MuxerModule;
}

async function probeAvcEncoderConfig() {
  if (encoderConfigCache !== undefined) return encoderConfigCache;
  encoderConfigCache = null;
  if (!window.VideoEncoder) return null;
  const width = evenDim(W);
  const height = evenDim(H);
  for (const codec of AVC_CODEC_CANDIDATES) {
    const config = {
      codec,
      width,
      height,
      bitrate: 8_000_000,
      framerate: 60,
    };
    try {
      const { supported } = await VideoEncoder.isConfigSupported(config);
      if (supported) {
        encoderConfigCache = config;
        return config;
      }
    } catch (_) {}
  }
  return null;
}

function ffmpegAsset(file) {
  return new URL('vendor/ffmpeg/' + file, window.location.href).href;
}

function loadFfmpegScript() {
  if (window.FFmpegWASM) return Promise.resolve();
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'vendor/ffmpeg/ffmpeg.js';
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('vendor/ffmpeg/ffmpeg.js を読み込めません'));
    document.head.appendChild(s);
  });
}

async function getFfmpeg() {
  if (ffmpegInstance) return ffmpegInstance;
  await loadFfmpegScript();
  if (!window.FFmpegWASM) throw new Error('ffmpeg.wasm の読み込みに失敗しました');
  const { FFmpeg } = FFmpegWASM;
  const ffmpeg = new FFmpeg();
  ffmpeg.on('log', () => {});
  await ffmpeg.load({
    coreURL: ffmpegAsset('ffmpeg-core.js'),
    wasmURL: ffmpegAsset('ffmpeg-core.wasm'),
    workerURL: ffmpegAsset('ffmpeg-core.worker.js'),
  });
  ffmpegInstance = ffmpeg;
  return ffmpeg;
}

async function transcodeWebmToH264Mp4(webmBlob) {
  setRecStatus('H.264 変換中…');
  const ffmpeg = await getFfmpeg();
  const input = new Uint8Array(await webmBlob.arrayBuffer());
  await ffmpeg.writeFile('input.webm', input);
  try {
    await ffmpeg.exec([
      '-i', 'input.webm', '-an',
      '-c:v', 'libx264',
      '-preset', 'fast', '-crf', '23',
      '-pix_fmt', 'yuv420p',
      '-movflags', '+faststart',
      'output.mp4',
    ]);
  } catch (_) {
    await ffmpeg.deleteFile('input.webm').catch(() => {});
    throw new Error('H.264 MP4 への変換に失敗しました。ページを再読み込みしてお試しください。');
  }
  const out = await ffmpeg.readFile('output.mp4');
  await ffmpeg.deleteFile('input.webm').catch(() => {});
  await ffmpeg.deleteFile('output.mp4').catch(() => {});
  return new Blob([out.buffer], { type: 'video/mp4' });
}

async function startRecordingWebCodecs(encoderConfig) {
  const { Muxer, ArrayBufferTarget } = await getMp4Muxer();
  const width = encoderConfig.width;
  const height = encoderConfig.height;

  recMuxer = new Muxer({
    target: new ArrayBufferTarget(),
    video: { codec: 'avc', width, height },
    fastStart: 'in-memory',
  });

  videoEncoder = new VideoEncoder({
    output: (chunk, meta) => recMuxer.addVideoChunk(chunk, meta),
    error: e => console.error('VideoEncoder:', e),
  });

  videoEncoder.configure(encoderConfig);
  recEncoderConfig = encoderConfig;
  recMode = 'webcodecs';
  recFrameCount = 0;
  recordStartTime = performance.now();
  updateRecordUI(true);
  setRecStatus('H.264 録画中');
  tickRecTime();
  recordTimerId = setInterval(tickRecTime, 250);
}

function captureRecordingFrame() {
  if (recMode !== 'webcodecs' || !videoEncoder || videoEncoder.state !== 'configured') return;
  try {
    const ts = Math.round((performance.now() - recordStartTime) * 1000);
    const frame = new VideoFrame(canvas, {
      timestamp: ts,
      duration: Math.round(1e6 / 60),
    });
    videoEncoder.encode(frame, { keyFrame: recFrameCount % 60 === 0 });
    frame.close();
    recFrameCount++;
  } catch (_) {}
}

async function finishWebCodecsRecording() {
  isProcessingRecording = true;
  updateRecordUI(false);
  setRecStatus('MP4 書き出し中…');
  try {
    if (videoEncoder && videoEncoder.state === 'configured') {
      await videoEncoder.flush();
      videoEncoder.close();
    }
    videoEncoder = null;
    if (recMuxer) {
      recMuxer.finalize();
      const buffer = recMuxer.target.buffer;
      downloadBlob(new Blob([buffer], { type: 'video/mp4' }), 'locus-' + Date.now() + '.mp4');
      recMuxer = null;
    }
  } catch (e) {
    alert('MP4 の書き出しに失敗しました: ' + e.message);
  } finally {
    recMode = null;
    recEncoderConfig = null;
    isProcessingRecording = false;
    updateRecordUI(false);
  }
}

function pickRecordMime() {
  const types = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
  for (const t of types) {
    if (MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

function startRecordingWebM() {
  recordChunks = [];
  recordStream = canvas.captureStream(60);
  recordMime = pickRecordMime();
  const opts = { videoBitsPerSecond: 12_000_000 };
  if (recordMime) opts.mimeType = recordMime;
  try {
    mediaRecorder = new MediaRecorder(recordStream, opts);
  } catch (_) {
    mediaRecorder = new MediaRecorder(recordStream);
    recordMime = 'video/webm';
  }

  mediaRecorder.ondataavailable = ev => {
    if (ev.data && ev.data.size) recordChunks.push(ev.data);
  };
  mediaRecorder.onerror = () => {
    alert('録画中にエラーが発生しました。');
    stopRecording();
  };

  recMode = 'webm';
  mediaRecorder.start(250);
  recordStartTime = Date.now();
  updateRecordUI(true);
  setRecStatus('録画中（停止後 H.264 変換）');
  tickRecTime();
  recordTimerId = setInterval(tickRecTime, 250);
}

async function finishWebmRecording() {
  if (recordStream) {
    recordStream.getTracks().forEach(t => t.stop());
    recordStream = null;
  }
  const type = recordMime || 'video/webm';
  if (!recordChunks.length) {
    recMode = null;
    updateRecordUI(false);
    return;
  }
  const webmBlob = new Blob(recordChunks, { type });
  recordChunks = [];
  mediaRecorder = null;
  recMode = null;

  isProcessingRecording = true;
  updateRecordUI(false);
  try {
    const mp4 = await transcodeWebmToH264Mp4(webmBlob);
    downloadBlob(mp4, 'locus-' + Date.now() + '.mp4');
  } catch (e) {
    alert(e.message || String(e));
  } finally {
    isProcessingRecording = false;
    updateRecordUI(false);
  }
}

async function startRecording() {
  if (isRecording || isProcessingRecording) return;

  const avc = await probeAvcEncoderConfig();
  if (avc) {
    await startRecordingWebCodecs(avc);
    return;
  }

  if (!window.MediaRecorder || !canvas.captureStream) {
    alert('このブラウザでは録画に対応していません。\nChrome / Firefox / Safari の最新版をお試しください。');
    return;
  }

  startRecordingWebM();
}

function stopRecording() {
  if (recMode === 'webcodecs') {
    isRecording = false;
    finishWebCodecsRecording();
    return;
  }
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    isRecording = false;
    mediaRecorder.onstop = () => { finishWebmRecording(); };
    mediaRecorder.stop();
    return;
  }
  if (recordStream) {
    recordStream.getTracks().forEach(t => t.stop());
    recordStream = null;
  }
  updateRecordUI(false);
}

window.addEventListener('beforeunload', e => {
  if (isRecording || isProcessingRecording) {
    e.preventDefault();
    e.returnValue = '';

function importJsonFile(file) {

}

// ─── Demo mode ───────────────────────────────────────────────────────
const DEMO_BANNER_MS = 5000;
const DEMO_CYCLE_SEC = 30;

let demoActive = false;
let demoBannerTimer = null;
let demoCycleTimer = null;
let demoFirstPlayTimer = null;
let demoCountdownEnd = 0;
let demoCountdownRaf = null;

function showDemoBanner() {
  const el = document.getElementById('demo-banner');
  if (el) {
    el.classList.add('visible');
    el.setAttribute('aria-hidden', 'false');
  }
}

function hideDemoBanner() {
  const el = document.getElementById('demo-banner');
  if (el) {
    el.classList.remove('visible');
    el.setAttribute('aria-hidden', 'true');
  }
}

function showDemoCountdown() {
  const el = document.getElementById('demo-countdown');
  if (el) {
    el.classList.add('visible');
    el.setAttribute('aria-hidden', 'false');
  }
}

function hideDemoCountdown() {
  const el = document.getElementById('demo-countdown');
  if (el) {
    el.classList.remove('visible');
    el.textContent = '';
    el.setAttribute('aria-hidden', 'true');
  }
  if (demoCountdownRaf != null) {
    cancelAnimationFrame(demoCountdownRaf);
    demoCountdownRaf = null;
  }
}

function resetDemoCountdown() {
  demoCountdownEnd = Date.now() + DEMO_CYCLE_SEC * 1000;
  showDemoCountdown();
  if (demoCountdownRaf == null) tickDemoCountdown();
}

function tickDemoCountdown() {
  if (!demoActive) {
    demoCountdownRaf = null;
    return;
  }
  const el = document.getElementById('demo-countdown');
  const remain = Math.max(0, Math.ceil((demoCountdownEnd - Date.now()) / 1000));
  if (el) el.textContent = String(remain);
  demoCountdownRaf = requestAnimationFrame(tickDemoCountdown);
}

function stopDemo() {
  if (!demoActive) return;
  demoActive = false;
  if (demoBannerTimer) clearTimeout(demoBannerTimer);
  if (demoCycleTimer) clearInterval(demoCycleTimer);
  if (demoFirstPlayTimer) clearTimeout(demoFirstPlayTimer);
  demoBannerTimer = demoCycleTimer = demoFirstPlayTimer = null;
  hideDemoBanner();
  hideDemoCountdown();
}

function runRandomDemoPlayback() {
  if (!demoActive || batchActive || isRecording) return;
  const count = rndInt(2, 3);
  shapes.length = 0;
  buildRandomInitialShapes(count).forEach(s => {
    if (s) shapes.push(s);
  });
  collapseLegacyDupTabs();
  PAIRS = computePairs();
  activeTabIdx = 0;
  view.scale = 1;
  view.panX = 0;
  view.panY = 0;
  shapes.forEach(s => { s.paused = false; s.angle = 0; });
  clearTrails();
  clearSimHistory();
  buildUI();
  updatePlaybackUI();
  resetDemoCountdown();
}

function isDemoCancelIgnoredEvent(e) {
  const t = e && e.target;
  return t && typeof t.closest === 'function'
    && t.closest('#sound-prefs-modal, .pair-fx-panel');
}

function armDemoCancellation() {
  const cancel = e => {
    if (e && e.isTrusted === false) return;
    if (isDemoCancelIgnoredEvent(e)) return;
    stopDemo();
  };
  ['pointerdown', 'keydown', 'wheel'].forEach(ev => {
    window.addEventListener(ev, cancel, { capture: true, passive: ev === 'wheel' });
  });
}

function dismissSoundPrefsModal(enableSound) {
  const modal = document.getElementById('sound-prefs-modal');
  setAllPairsSoundEnabled(!!enableSound);
  if (modal) {
    modal.classList.remove('visible');
    modal.setAttribute('aria-hidden', 'true');
  }
  if (pairFxEditorRefresh) pairFxEditorRefresh();
  if (!demoActive) startDemoMode();
}

function showSoundPrefsModal() {
  const modal = document.getElementById('sound-prefs-modal');
  const offBtn = document.getElementById('soundPrefOff');
  const onBtn = document.getElementById('soundPrefOn');
  if (!modal || !offBtn || !onBtn) {
    startDemoMode();
    return;
  }
  modal.classList.add('visible');
  modal.setAttribute('aria-hidden', 'false');
  const pick = enableSound => {
    offBtn.classList.toggle('active-choice', !enableSound);
    onBtn.classList.toggle('active-choice', enableSound);
    dismissSoundPrefsModal(enableSound);
  };
  offBtn.addEventListener('click', () => pick(false), { once: true });
  onBtn.addEventListener('click', () => pick(true), { once: true });
}

function startDemoMode() {
  if (demoActive) return;
  demoActive = true;
  armDemoCancellation();
  showDemoBanner();
  demoBannerTimer = setTimeout(() => {
    if (demoActive) hideDemoBanner();
  }, DEMO_BANNER_MS);
  demoFirstPlayTimer = setTimeout(() => {
    if (demoActive) runRandomDemoPlayback();
  }, DEMO_BANNER_MS);
  demoCycleTimer = setInterval(() => {
    if (demoActive) runRandomDemoPlayback();
  }, DEMO_CYCLE_SEC * 1000);
}

// ─── Startup ─────────────────────────────────────────────────────────
try {
  loadTrailSettings();
  loadPersistedSaves();
  syncGlobalPresetsFromNamedSaves();
  seedBuiltinGlobalPresets();
  initGlobalPresetThumbs();
  applyInitialShapes();
  PAIRS = computePairs();
  activeTabIdx = 0;
  clearTrails();
  renderGlobalPresets();
  buildUI();
  renderSavesStrip();
  const canvasWrap = document.getElementById('canvas-wrap');
  if (canvasWrap) canvasWrap.addEventListener('pointerdown', unlockHitAudio, { once: true });
  requestAnimationFrame(frame);
  showSoundPrefsModal();
} catch (err) {
  console.error(err);
  const box = document.createElement('pre');
  box.style.cssText = 'color:#f88;padding:16px;font:12px Menlo,monospace;white-space:pre-wrap';
  box.textContent = '起動エラー: ' + (err && err.message ? err.message : String(err));
  document.body.appendChild(box);
}

// ─── Canvas drag ─────────────────────────────────────────────────────
function updateHandleInputs(i) {
  const s=shapes[i];
  const fxEl=document.getElementById(`fx${i}`); if(fxEl) fxEl.value=Math.round(s.fx);
  const fyEl=document.getElementById(`fy${i}`); if(fyEl) fyEl.value=Math.round(s.fy);
  const pxEl=document.getElementById(`px${i}`); if(pxEl) pxEl.value=Math.round(s.px);
  const pyEl=document.getElementById(`py${i}`); if(pyEl) pyEl.value=Math.round(s.py);
}

const HIT_R=11;
function hitTest(mx,my) {
  const sAct = shapes[activeTabIdx];
  if (sAct && sAct.visible && isParabolaShape(sAct)) {
    const w = parabolaWorldPoints(sAct);
    const paraHits = [
      { type: 'para1', p: w.p1, r: HIT_R + 3 },
      { type: 'para2', p: w.p2, r: HIT_R },
    ];
    for (const h of paraHits) {
      if (Math.hypot(mx - wx(h.p.x), my - wy(h.p.y)) < h.r) {
        return { type: h.type, idx: activeTabIdx };
      }
    }
  }
  for(let i=0;i<shapes.length;i++){
    const s=shapes[i]; if(!s.visible) continue;
    const {pxc,pyc}=pivotScreen(s);
    const centers=getDupCenters(s);
    const primary=centers.find(c=>c.primary)||centers[0];
    const f=centerWorldAt(s,primary.fx,primary.fy);
    const fxc=wx(f.x), fyc=wy(f.y);
    if(Math.hypot(mx-fxc,my-fyc)<HIT_R) return {type:'fig',idx:i};
    if(Math.hypot(mx-pxc,my-pyc)<HIT_R) return {type:'piv',idx:i};
  }
  return null;
}

function applyDrag(ddx,ddy,idx) {
  const s=shapes[idx];
  const dw=worldDeltaFromScreen(ddx,ddy);
  if (drag.type === 'para1' || drag.type === 'para2') {
    const dl = worldDeltaToLocal(s, dw.x, dw.y);
    if (drag.type === 'para1') {
      s.parabola.p1.y += dl.y;
    } else {
      const cx = (s.parabola.p0.x + s.parabola.p2.x) / 2;
      const w = Math.max(1, Math.abs(s.parabola.p2.x - cx) + dl.x * 0.5);
      s.parabola.p0.x = cx - w;
      s.parabola.p2.x = cx + w;
    }
    syncSymmetricParabola(s);
    refreshShapeCurve(s, s.N);
    const ftag = document.getElementById(`ftag${idx}`);
    if (ftag) ftag.textContent = 'parabola';
    updateShapeThumb(idx);
    return;
  }
  if(drag.type==='piv'){
    s.px+=dw.x; s.py+=dw.y;
  } else {
    const ca=Math.cos(s.angle), sa=Math.sin(s.angle);
    const {fx,fy,px,py}=s;
    const rfx=px+(fx-px)*ca-(fy-py)*sa, rfy=py+(fx-px)*sa+(fy-py)*ca;
    const rfx2=rfx+dw.x, rfy2=rfy+dw.y;
    s.fx=px+(rfx2-px)*ca+(rfy2-py)*sa;
    s.fy=py-(rfx2-px)*sa+(rfy2-py)*ca;
  }
  updateHandleInputs(idx);
}

function endCanvasDrag() {
  const wasShapeDrag = drag && (drag.type === 'fig' || drag.type === 'piv' || drag.type.startsWith('para'));
  drag = null;
  panDrag = null;
  canvas.style.cursor = 'default';
  if (wasShapeDrag) resetTimingAndTrails();
}

let panDrag=null;

function canvasCoords(e) {
  const r=canvas.getBoundingClientRect();
  return {
    mx:(e.clientX-r.left)*(W/r.width),
    my:(e.clientY-r.top)*(H/r.height),
  };
}

canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  const {mx,my}=canvasCoords(e);
  const before=screenToWorld(mx,my);
  const factor=e.deltaY>0?0.9:1.1;
  view.scale=Math.min(10,Math.max(0.12,view.scale*factor));
  const after=screenToWorld(mx,my);
  view.panX+=before.x-after.x;
  view.panY+=before.y-after.y;
  viewDirty=true;
},{passive:false});

canvas.addEventListener('dblclick', e=>{
  e.preventDefault();
  resetView();
});

canvas.addEventListener('mousedown', e=>{
  const {mx,my}=canvasCoords(e);
  if(e.shiftKey||e.button===1){
    panDrag={lastX:mx,lastY:my};
    canvas.style.cursor='move';
    e.preventDefault();
    return;
  }
  const hit=hitTest(mx,my);
  if(hit){ drag={...hit,lastX:mx,lastY:my}; canvas.style.cursor='grabbing'; e.preventDefault(); }
});
canvas.addEventListener('mousemove', e=>{
  const {mx,my}=canvasCoords(e);
  if(panDrag){
    const ddx=mx-panDrag.lastX, ddy=my-panDrag.lastY;
    panDrag.lastX=mx; panDrag.lastY=my;
    view.panX-=ddx/view.scale;
    view.panY+=ddy/view.scale;
    viewDirty=true;
    return;
  }
  if(!drag){ canvas.style.cursor=hitTest(mx,my)?'grab':'default'; return; }
  const ddx=mx-drag.lastX, ddy=my-drag.lastY;
  drag.lastX=mx; drag.lastY=my;
  applyDrag(ddx,ddy,drag.idx);
});
canvas.addEventListener('mouseup', endCanvasDrag);
canvas.addEventListener('mouseleave', endCanvasDrag);

canvas.addEventListener('touchstart', e=>{
  if(e.touches.length!==1) return;
  const r=canvas.getBoundingClientRect(); const t=e.touches[0];
  const mx=(t.clientX-r.left)*(W/r.width), my=(t.clientY-r.top)*(H/r.height);
  const hit=hitTest(mx,my);
  if(hit){ drag={...hit,lastX:mx,lastY:my}; e.preventDefault(); }
},{passive:false});
canvas.addEventListener('touchmove', e=>{
  if(!drag||e.touches.length!==1) return;
  e.preventDefault();
  const r=canvas.getBoundingClientRect(); const t=e.touches[0];
  const mx=(t.clientX-r.left)*(W/r.width), my=(t.clientY-r.top)*(H/r.height);
  const ddx=mx-drag.lastX, ddy=my-drag.lastY;
  drag.lastX=mx; drag.lastY=my;
  applyDrag(ddx,ddy,drag.idx);
},{passive:false});
canvas.addEventListener('touchend', endCanvasDrag);
</script>
