<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>交点の軌跡</title>
<script src="vendor/math.min.js"></script>
<script src="vendor/fflate.min.js"></script>
<script src="presets/global_presets_data.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --text: #fff;
  --text-soft: rgba(255,255,255,.88);
  --text-muted: rgba(255,255,255,.72);
}
body {
  background:#0a0a12; color:var(--text);
  font-family:'Menlo','Consolas',monospace; font-size:12px;
  display:flex; flex-direction:column; align-items:center;
  padding:10px 14px 18px; gap:8px;
  min-height:100vh;
}
h1 { font-size:11px; font-weight:normal; letter-spacing:.22em; color:var(--text-soft); width:100%; max-width:1280px; }

#app-shell { width:100%; max-width:1280px; display:flex; flex-direction:column; gap:10px; }

/* ── main row: canvas + panel side by side ── */
#main-row { display:flex; gap:14px; align-items:flex-start; width:100%; }
#canvas-col { display:flex; flex-direction:column; gap:6px; flex:1; min-width:0; }
#side-panel { display:flex; flex-direction:column; gap:0; flex-shrink:0; width:320px; max-height:calc(100vh - 120px); overflow-y:auto; }
#side-panel::-webkit-scrollbar { width:10px; }
#side-panel::-webkit-scrollbar-thumb { background:rgba(255,255,255,.18); border-radius:5px; }
#canvas-wrap { position:relative; line-height:0; }
#canvas-wrap canvas { display:block; border-radius:4px; border:1px solid rgba(255,255,255,.06); }
.canvas-hint {
  position:absolute; bottom:6px; left:8px; font-size:9px;
  color:var(--text-soft); pointer-events:none;
}
#demo-banner {
  display:none; position:absolute; inset:0; z-index:6;
  align-items:center; justify-content:center;
  background:rgba(0,0,0,.42); pointer-events:none;
  font-size:17px; letter-spacing:.28em; color:rgba(255,230,150,.96);
  text-shadow:0 0 24px rgba(255,200,80,.35);
}
#demo-banner.visible { display:flex; }
#demo-countdown {
  display:none; position:absolute; right:10px; bottom:10px; z-index:7;
  pointer-events:none; font-size:22px; font-variant-numeric:tabular-nums;
  letter-spacing:.06em; color:rgba(255,230,150,.92);
  text-shadow:0 0 12px rgba(0,0,0,.8);
  padding:4px 10px; border-radius:4px;
  background:rgba(0,0,0,.45); border:1px solid rgba(255,200,80,.25);
}
#demo-countdown.visible { display:block; }
.sound-prefs-modal {
  display:none; position:fixed; inset:0; z-index:40;
  align-items:center; justify-content:center;
  background:rgba(0,0,0,.55); padding:16px;
}
.sound-prefs-modal.visible { display:flex; }
.sound-prefs-box {
  width:min(280px, 92vw); padding:18px 20px 16px;
  background:#12121f; border:1px solid rgba(255,255,255,.14);
  border-radius:8px; box-shadow:0 12px 40px rgba(0,0,0,.5);
  display:flex; flex-direction:column; gap:12px; text-align:center;
}
.sound-prefs-title { font-size:14px; color:var(--text); letter-spacing:.12em; }
.sound-prefs-desc {
  font-size:11px; color:var(--text-soft); line-height:1.5; margin:0;
}
.sound-prefs-desc small { font-size:10px; opacity:.85; }
.sound-prefs-actions {
  display:flex; gap:10px; justify-content:center;
}
.sound-pref-btn {
  min-width:88px; padding:8px 16px; font-size:12px;
}
.rec-indicator {
  display:none; position:absolute; top:8px; right:8px;
  align-items:center; gap:6px; padding:4px 10px;
  background:rgba(0,0,0,.6); border:1px solid rgba(255,80,80,.25);
  border-radius:4px; font-size:10px; color:rgba(255,140,140,.95);
  pointer-events:none; letter-spacing:.06em;
}
.rec-indicator.active { display:flex; }
#rec-status { color:rgba(255,220,160,.85); margin-left:4px; }
.rec-dot {
  width:8px; height:8px; border-radius:50%; background:#f44;
  animation:rec-blink 1s ease-in-out infinite;
}
@keyframes rec-blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.reset-btn.rec-stop { color:#faa; border-color:rgba(255,90,90,.35); }
.reset-btn.rec-stop:not(:disabled):hover { background:rgba(255,60,60,.15); color:#fcc; }
.reset-btn.rec-stop:disabled { opacity:.35; }
.reset-btn.rec-start:not(:disabled) { color:#faa; border-color:rgba(255,90,90,.25); }
.reset-btn.rec-start:not(:disabled):hover { background:rgba(255,60,60,.12); }
.reset-btn.rec-start:disabled { opacity:.4; }
.formula-hint { color:var(--text-soft); margin-top:2px; }
@media (max-width: 960px) {
  #main-row { flex-direction:column; align-items:stretch; }
  #side-panel { width:100% !important; max-width:none; max-height:none; overflow:visible; }
  #canvas-col { align-items:center; }
}

/* ── panel ── */
#panel { display:flex; flex-direction:column; gap:0; flex:1; min-width:0; }
.panel-section {
  padding:10px 12px; border-top:1px solid rgba(255,255,255,.06);
  display:flex; flex-direction:column; gap:8px;
}
.panel-section:first-child { border-top:none; }
.panel-section-title {
  font-size:9px; color:var(--text-soft); letter-spacing:.12em; text-transform:uppercase;
}
.transport-block {
  display:flex; flex-direction:column; gap:8px;
  padding:10px 12px; border-bottom:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
}
.transport-transport-row {
  display:flex; gap:6px; align-items:stretch;
}
.transport-transport-row .transport-btn {
  flex:1; min-height:40px; min-width:0;
  font-size:17px; line-height:1; letter-spacing:.02em;
  padding:8px 10px; border-radius:6px;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.22);
  color:var(--text);
}
.transport-transport-row .transport-btn-main {
  flex:1.15; font-size:18px; font-weight:600;
  background:rgba(100,180,255,.14); border-color:rgba(120,200,255,.45);
  color:#e8f4ff;
}
.transport-transport-row .transport-btn-main.is-pausing {
  background:rgba(255,200,80,.16); border-color:rgba(255,210,100,.5); color:#fff6d8;
  letter-spacing:-0.06em;
}
.transport-transport-row .transport-btn:hover:not(:disabled) {
  background:rgba(255,255,255,.16); border-color:rgba(255,255,255,.35);
}
.transport-transport-row .transport-btn-main:hover:not(:disabled) {
  background:rgba(100,180,255,.24); color:#fff;
}
.transport-transport-row .transport-btn-main.is-pausing:hover:not(:disabled) {
  background:rgba(255,200,80,.26);
}
.transport-transport-row .transport-btn:disabled {
  opacity:.26; cursor:not-allowed;
  background:rgba(255,255,255,.03); border-color:rgba(255,255,255,.08);
  color:rgba(255,255,255,.35);
}
.transport-utils-rows {
  border:1px solid rgba(255,255,255,.08); border-radius:5px;
  background:rgba(0,0,0,.12); padding:6px 8px;
  display:flex; flex-direction:column; gap:5px;
}
.transport-utils-line {
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
}
.transport-utils-lbl {
  flex-shrink:0; font-size:10px; color:var(--text-soft);
  letter-spacing:.04em; user-select:none; white-space:nowrap;
  min-width:3.8em;
}
.transport-utils-actions {
  display:flex; align-items:center; gap:4px; flex-wrap:wrap;
}
.transport-utils-actions .reset-btn {
  font-size:10px; padding:4px 8px; flex:0 0 auto; min-width:0;
  white-space:nowrap;
}
.transport-opt-btn.active-choice {
  color:var(--text); border-color:rgba(160,180,255,.4);
  background:rgba(160,180,255,.12);
}
.transport-fx-block {
  display:flex; flex-direction:column; gap:4px;
}
.transport-fx-block .transport-utils-lbl { min-width:4.6em; }
.transport-fx-block.fx-disabled .transport-fx-patterns {
  opacity:.3; pointer-events:none;
}
.transport-fx-patterns {
  display:grid; grid-template-columns:repeat(5, minmax(0, 1fr));
  gap:4px; padding:0 0 4px 3.9em; width:100%; box-sizing:border-box;
}
.fx-style-btn {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:3px 2px; border-radius:4px;
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1);
  color:var(--text-soft); font:inherit; cursor:pointer; min-width:0;
}
.fx-style-btn:hover { background:rgba(255,255,255,.09); color:var(--text); }
.fx-style-btn.active-choice {
  border-color:rgba(160,180,255,.45); background:rgba(160,180,255,.12); color:var(--text);
}
.fx-style-thumb {
  display:block; width:34px; height:34px; border-radius:3px;
  border:1px solid rgba(255,255,255,.08); image-rendering:pixelated;
}
.fx-style-name {
  font-size:7px; line-height:1.1; text-align:center;
  max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.card-details {
  display:none; flex-direction:column; gap:7px;
  padding-top:8px; border-top:1px dashed rgba(255,255,255,.08);
  margin-top:0;
}
.card-details.expanded { display:flex; }
.details-tab {
  width:100%; display:flex; align-items:center; gap:6px;
  margin-top:8px; padding:7px 10px;
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1);
  border-radius:4px; color:var(--text-soft); font:inherit; font-size:11px;
  cursor:pointer; text-align:left; transition:background .15s, color .15s, border-color .15s;
}
.details-tab:hover { color:var(--text); background:rgba(255,255,255,.07); }
.details-tab.open {
  color:var(--text); border-color:rgba(160,180,255,.28);
  background:rgba(160,180,255,.1);
}
.details-tab-chev { font-size:10px; opacity:.65; width:1em; flex-shrink:0; }
.collapsible-section { border-top:1px solid rgba(255,255,255,.06); }
.collapsible-hdr {
  width:100%; display:flex; align-items:center; gap:6px;
  padding:10px 14px; background:transparent; border:none;
  color:var(--text-soft); font:inherit; font-size:11px; letter-spacing:.08em;
  cursor:pointer; text-align:left;
}
.collapsible-hdr:hover { color:var(--text); background:rgba(255,255,255,.03); }
.collapsible-hdr .chev { font-size:10px; opacity:.6; width:1em; }
.collapsible-body { padding:0 14px 12px; display:flex; flex-direction:column; gap:8px; }
.collapsible-body.is-collapsed { display:none; }
.panel-inline-hdr { padding:0 0 6px; }
#bottom-bar { width:100%; max-width:1280px; }
.sliders-grid { display:flex; flex-direction:column; gap:8px; }
#bottom-bar {
  display:flex; flex-direction:column; gap:10px; width:100%;
}
.bottom-section { display:flex; flex-direction:column; gap:6px; }

/* tabs */
.tab-row {
  display:flex; gap:2px; padding:0 4px; flex-wrap:wrap;
  border-bottom:1px solid rgba(255,255,255,.08);
  align-items:flex-end;
}
.tab {
  display:flex; align-items:center; gap:5px;
  padding:6px 10px 5px 12px; background:transparent;
  border:none; border-bottom:2px solid transparent;
  color:var(--text-muted); font:inherit; font-size:11px;
  cursor:pointer; transition:color .15s; position:relative; top:1px;
}
.tab:hover  { color:var(--text); }
.tab.active { color:var(--text); }
.tab.dim-tab{ opacity:.35; }
.tab-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.tab-label { white-space:nowrap; }
.tab-close {
  display:flex; align-items:center; justify-content:center;
  width:16px; height:16px; margin-left:2px; padding:0;
  border:none; border-radius:3px; background:transparent;
  color:var(--text-muted); font:inherit; font-size:13px; line-height:1;
  cursor:pointer; flex-shrink:0;
}
.tab-close:hover {
  background:rgba(255,60,60,.2); color:#f88;
}
.tab-add {
  padding:5px 14px 4px; background:transparent;
  border:none; border-bottom:2px solid transparent;
  color:var(--text-muted); font:inherit; font-size:17px; line-height:1;
  cursor:pointer; transition:color .15s; position:relative; top:1px;
}
.tab-add:hover { color:var(--text); }

/* card area */
.card-area {
  border:1px solid rgba(255,255,255,.07); border-top:none;
  border-radius:0 0 5px 5px; padding:12px 14px 14px;
  background:rgba(255,255,255,.02);
}
.card-full { display:none; flex-direction:column; gap:7px; }
.card-full.active { display:flex; }

/* card header */
.card-head {
  display:flex; align-items:center; gap:8px;
  padding-bottom:10px; border-bottom:1px solid rgba(255,255,255,.05);
}
.shape-prev { border-radius:4px; flex-shrink:0; }
.head-info  { display:flex; align-items:center; gap:6px; flex:1; flex-wrap:wrap; }
.swatch     { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.card-name  { color:var(--text); font-size:12px; }
.ftype-tag  { font-size:9px; padding:1px 5px; border-radius:3px;
              background:rgba(255,255,255,.12); color:var(--text-soft); }
.vis-btn {
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  border-radius:3px; color:var(--text); font:inherit; font-size:10px;
  padding:2px 8px; cursor:pointer;
}
.vis-btn:hover { background:rgba(255,255,255,.12); color:var(--text); }
.vis-btn.on    { color:#aac; border-color:rgba(160,180,255,.3); }
/* field rows */
.cf { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.cf-lbl {
  width:70px; flex-shrink:0; text-align:right; padding-right:6px;
  color:var(--text); font-size:11px;
}
.row { display:flex; align-items:center; gap:4px; }
.lbl { color:var(--text-soft); flex-shrink:0; min-width:18px; }
input {
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.09);
  border-radius:3px; color:var(--text); font:inherit; font-size:11px;
  padding:2px 5px; outline:none; transition:border-color .15s;
}
input:focus { border-color:rgba(255,255,255,.28); }
input.w60  { width:60px; text-align:right; }
input.w70  { width:70px; text-align:right; }
input.w80  { width:80px; text-align:right; }
input.ferr { border-color:rgba(255,80,80,.55); }
.err-msg   { font-size:10px; color:#f87; display:none; word-break:break-all; }
.sep       { color:var(--text-soft); }
.desc      { font-size:9px; color:var(--text-muted); line-height:1.5; padding:0 2px; }
.desc b    { color:var(--text); font-weight:normal; }
.body-tag  { font-size:8px; color:#fff; margin-left:4px; }

/* preset strip */
.preset-lbl { font-size:9px; color:var(--text-soft); margin-top:2px; }
.preset-strip {
  display:grid; grid-template-columns:repeat(4, minmax(0, 1fr));
  gap:6px 8px; padding-bottom:4px;
}
.p-item {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  cursor:pointer; min-width:0; opacity:.65; transition:opacity .15s, border-color .15s;
}
.p-item:hover { opacity:1; }
.p-item canvas { border-radius:3px; border:1px solid rgba(255,255,255,.08); display:block; }
.p-item:hover canvas { border-color:rgba(255,255,255,.3); }
.p-item.p-item-selected canvas { border-color:rgba(160,180,255,.65); box-shadow:0 0 0 1px rgba(160,180,255,.35); }
.p-item.p-item-selected { opacity:1; }
.p-item span { font-size:8px; color:var(--text); white-space:nowrap; text-align:center; line-height:1.15; }
.preset-params {
  display:none; flex-direction:column; gap:6px; margin-top:6px;
  padding:8px 10px; border-radius:4px;
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1);
}
.preset-params.visible { display:flex; }
.preset-params-title { font-size:10px; color:var(--text); margin:0 0 2px; }
.preset-params-row {
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  font-size:10px; color:var(--text-muted);
}
.preset-params-row label { color:var(--text); min-width:2.5em; flex-shrink:0; font-size:10px; }
.preset-params-row input, .preset-params-row select {
  width:56px; font-size:10px; padding:3px 5px;
}
.preset-params-row input.wide { width:100px; flex:1; min-width:72px; }
.preset-params .apply-ps {
  align-self:flex-start;
  background:rgba(160,180,255,.12); border:1px solid rgba(160,180,255,.28);
  border-radius:3px; color:var(--text); font:inherit; font-size:10px;
  padding:4px 14px; cursor:pointer; margin-top:2px;
}
.preset-params .apply-ps:hover { background:rgba(160,180,255,.22); }

.preset-custom { display:flex; flex-direction:column; gap:7px; margin-top:8px; }
.preset-custom-row {
  display:flex; align-items:center; gap:5px; flex-wrap:wrap;
  font-size:10px; color:var(--text-muted);
}
.preset-custom-row .pc-lbl {
  color:var(--text); min-width:44px; flex-shrink:0; font-size:10px;
}
.preset-custom-row input, .preset-custom-row select {
  width:52px; font-size:10px; padding:2px 4px;
}
.preset-custom-row input.wide { width:88px; flex:1; min-width:60px; }
.apply-pc {
  background:rgba(160,180,255,.1); border:1px solid rgba(160,180,255,.25);
  border-radius:3px; color:var(--text); font:inherit; font-size:9px;
  padding:2px 10px; cursor:pointer; margin-left:auto;
}
.apply-pc:hover { background:rgba(160,180,255,.2); }

/* bottom */
.bottom { display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; }
.pair-legend { display:flex; flex-direction:column; gap:5px; font-size:10px; color:var(--text-soft); flex:1; }
.pair-row {
  display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none;
  padding:2px 4px; border-radius:3px; transition:background .12s;
}
.pair-row:hover { background:rgba(255,255,255,.04); }
.pair-row.off { opacity:.35; }
.pair-row.selected {
  background:rgba(160,180,255,.1); outline:1px solid rgba(160,180,255,.28);
  border-radius:4px;
}
.pair-row input { accent-color:#8af; cursor:pointer; }
.pair-fx-panel {
  margin-top:8px; padding-top:8px; border-top:1px dashed rgba(255,255,255,.1);
  display:flex; flex-direction:column; gap:6px;
}
.pair-fx-title { font-size:10px; color:var(--text-soft); }
.pair-fx-apply-all {
  align-self:flex-start; font-size:9px; padding:3px 8px;
}
.pdot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:3px; vertical-align:middle; flex-shrink:0; }
.ctrl-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:6px; }
.ctrl-row label { font-size:10px; color:var(--text); white-space:nowrap; }
.ctrl-row input[type=range] { flex:1; min-width:80px; accent-color:#8af; }
.export-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
.hint { font-size:9px; color:var(--text-muted); }
.batch-panel {
  margin-top:8px; padding-top:8px; border-top:1px solid rgba(255,255,255,.1);
  display:flex; flex-direction:column; gap:6px;
}
.batch-panel .batch-title { font-size:10px; color:var(--text); }
.batch-progress { font-size:9px; color:var(--text-soft); min-height:1.2em; }
.batch-progress progress { width:100%; height:6px; accent-color:#8af; }
.reset-btn {
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
  border-radius:3px; color:var(--text); font:inherit; font-size:11px;
  padding:5px 14px; cursor:pointer; flex-shrink:0;
}
.reset-btn:hover { background:rgba(255,255,255,.11); color:var(--text); }
.tog     { color:var(--text-muted); border-color:rgba(255,255,255,.08); }
.tog.on  { color:var(--text); border-color:rgba(160,180,255,.35); background:rgba(160,180,255,.07); }

/* save bar */
.save-bar {
  display:flex; align-items:center; gap:6px;
  margin-top:8px; padding-top:8px;
  border-top:1px solid rgba(255,255,255,.05);
}
.save-bar-lbl { font-size:10px; color:var(--text); flex-shrink:0; }
.save-bar input { flex:1; }
.save-bar-btn {
  background:rgba(160,180,255,.08); border:1px solid rgba(160,180,255,.2);
  border-radius:3px; color:#aac; font:inherit; font-size:11px;
  padding:5px 14px; cursor:pointer; flex-shrink:0; white-space:nowrap;
}
.save-bar-btn:hover { background:rgba(160,180,255,.17); color:#ccf; }

/* saves area */
/* global presets */
#global-presets { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:8px; }
.gp-label { font-size:9px; color:rgba(255,200,80,.55); letter-spacing:.1em; }
.gp-section-title {
  text-transform:none; letter-spacing:.04em; line-height:1.35; font-size:10px;
}
.global-presets-section {
  flex-shrink:0; padding:10px 12px 8px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.gp-btn {
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
  background:rgba(255,190,60,.06); border:1px solid rgba(255,190,60,.2);

<script>
'use strict';

// ─── Responsive canvas size ───────────────────────────────────────────
const MAXW    = 880;
const PANEL_W = 320;
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
let W = 600, H = 540;

const trailCv = document.createElement('canvas');
const tc = trailCv.getContext('2d');

const view = { scale: 1, panX: 0, panY: 0 };
let speedMul = 1;
let trailWidth = 1.5;
let trailDurationSec = 3;
const TRAIL_RESIDUAL = 0.04;
let viewDirty = false;
let encoderConfigCache = undefined;

function loadTrailSettings() {
  try {
    const d = JSON.parse(localStorage.getItem('locus_trail'));
    if (!d) return;
    if (typeof d.trailWidth === 'number') trailWidth = d.trailWidth;
    if (typeof d.trailDurationSec === 'number') trailDurationSec = d.trailDurationSec;
  } catch (_) {}
}

function persistTrailSettings() {
  try {
    localStorage.setItem('locus_trail', JSON.stringify({ trailWidth, trailDurationSec }));
  } catch (_) {}
}

function trailFadeAlpha(dt) {
  const sec = Math.max(0.3, trailDurationSec);
  return 1 - Math.pow(TRAIL_RESIDUAL, dt / sec);
}

function contentWidth() {
  const narrow = window.innerWidth < 960;
  return narrow ? window.innerWidth - 28 : Math.min(MAXW, window.innerWidth - 28 - PANEL_W - 20);
}

function applySizes() {
  W = contentWidth();
  H = Math.round(W * 0.9);
  canvas.width = W;
  canvas.height = H;
  trailCv.width = W;
  trailCv.height = H;
  const panel = document.getElementById('panel');
  const sidePanel = document.getElementById('side-panel');
  if (sidePanel) {
    if (window.innerWidth >= 960) sidePanel.style.width = PANEL_W + 'px';
    else sidePanel.style.width = '';
  }
  if (panel) {
    if (window.innerWidth >= 960) panel.style.width = '100%';
    else panel.style.width = '';
  }
  const shell = document.getElementById('app-shell');
  const rowW = shell ? shell.clientWidth : (window.innerWidth < 960 ? W : W + 20 + PANEL_W);
  const savesArea = document.getElementById('saves-area');
  if (savesArea) savesArea.style.width = '100%';
  encoderConfigCache = undefined;
  redrawAllTrails();
}
window.addEventListener('resize', () => { applySizes(); });

function wx(x) { return W / 2 + (x - view.panX) * view.scale; }
function wy(y) { return H / 2 - (y - view.panY) * view.scale; }
function screenToWorld(sx, sy) {
  return {
    x: (sx - W / 2) / view.scale + view.panX,
    y: (H / 2 - sy) / view.scale + view.panY,
  };
}
function worldDeltaFromScreen(ddx, ddy) {
  return { x: ddx / view.scale, y: -ddy / view.scale };
}

const pairTrails = {};
const TRAIL_MAX = 5000;
const TRAIL_MATCH = 40;
function pairKey(i, j) { return i + '-' + j; }

function clearTrails() {
  Object.keys(pairTrails).forEach(k => delete pairTrails[k]);
  tc.fillStyle = '#000';
  tc.fillRect(0, 0, W, H);
}

function resetTimingAndTrails() {
  shapes.forEach(s => { s.angle = 0; });
  clearTrails();
  clearSimHistory();
}

/** プリセット適用後: 角度・軌跡をリセットし全図形を停止 */
function resetPlaybackAfterPreset() {
  shapes.forEach(s => {
    s.angle = 0;
    s.paused = true;
  });
  clearTrails();
  clearSimHistory();
  seedSimHistory();
  updatePlaybackUI();
}

// ─── Frame step (all paused) ─────────────────────────────────────────
const SIM_FRAME_DT = 1 / 60;
let simHistory = [];
let simHistoryIndex = -1;

function allShapesPaused() {
  return shapes.length > 0 && shapes.every(s => s.paused);
}

function anyShapeRunning() {
  return shapes.some(s => !s.paused);
}

function clonePairTrails() {
  const out = {};
  Object.keys(pairTrails).forEach(key => {
    out[key] = {
      tracks: pairTrails[key].tracks.map(tr => ({
        points: tr.points.map(p => ({ x: p.x, y: p.y })),
      })),
    };
  });
  return out;
}

function restorePairTrails(data) {
  Object.keys(pairTrails).forEach(k => delete pairTrails[k]);
  Object.keys(data).forEach(key => {
    pairTrails[key] = {
      tracks: data[key].tracks.map(tr => ({
        points: tr.points.map(p => ({ x: p.x, y: p.y })),
      })),
    };
  });
}

function captureSimState() {
  return { angles: shapes.map(s => s.angle), trails: clonePairTrails() };
}

function restoreSimState(state) {
  shapes.forEach((s, i) => { s.angle = state.angles[i]; });
  restorePairTrails(state.trails);
  viewDirty = true;
  redrawAllTrails();
}

function clearSimHistory() {
  simHistory = [];
  simHistoryIndex = -1;
}

function seedSimHistory() {
  clearSimHistory();
  simHistory.push(captureSimState());
  simHistoryIndex = 0;
}

function updatePlaybackUI() {
  const allPauseBtn = document.getElementById('allPauseBtn');
  const stepBackBtn = document.getElementById('stepBackBtn');
  const stepFwdBtn = document.getElementById('stepFwdBtn');
  const running = anyShapeRunning();
  const paused = allShapesPaused();
  if (allPauseBtn) {
    allPauseBtn.textContent = running ? '||' : '▶';
    allPauseBtn.classList.toggle('is-pausing', running);
    allPauseBtn.title = running ? '全図形を停止' : '全図形を再生';
  }
  if (stepBackBtn) stepBackBtn.disabled = !paused || simHistoryIndex <= 0;
  if (stepFwdBtn) stepFwdBtn.disabled = !paused;
  shapes.forEach((s, idx) => {
    const btn = document.getElementById(`pbtn${idx}`);
    if (!btn) return;
    btn.textContent = s.paused ? '▶ 再開' : '⏸ 停止';
    btn.classList.toggle('on', !s.paused);
  });
  if (!running) {
    hitFxBursts.length = 0;
    hitFxChains.length = 0;
    fadeAllPairSounds();
  }
}

function stepSimulationForward() {
  if (!allShapesPaused()) return;
  if (simHistoryIndex < 0) seedSimHistory();
  shapes.forEach(s => { s.angle += s.speed * speedMul * SIM_FRAME_DT; });
  recordIntersections();
  fadeTrailLayer(SIM_FRAME_DT);
  simHistory = simHistory.slice(0, simHistoryIndex + 1);
  simHistory.push(captureSimState());
  simHistoryIndex = simHistory.length - 1;
  updatePlaybackUI();
}

function stepSimulationBack() {
  if (!allShapesPaused() || simHistoryIndex <= 0) return;
  simHistoryIndex -= 1;
  restoreSimState(simHistory[simHistoryIndex]);
  updatePlaybackUI();
}

function resetView() {
  view.scale = 1;
  view.panX = 0;
  view.panY = 0;
  viewDirty = true;
  redrawAllTrails();
}

// ─── Formula helpers ──────────────────────────────────────────────────
const _sp = {};
function _star(n, k) {
  const key = n + ',' + k;
  if (_sp[key]) return _sp[key];
  const v = Array.from({length:n}, (_,i)=>({
    x: Math.cos(i*2*Math.PI/n - Math.PI/2),
    y: Math.sin(i*2*Math.PI/n - Math.PI/2),
  }));
  const p = [];
  for (let i=0,j=0; i<n; i++,j=(j+k)%n) p.push(v[j]);
  p.push(p[0]);
  return (_sp[key] = p);
}
const HELPERS = {
  poly(n, r, t) {
    const step = 2*Math.PI/n;
    const mod  = ((t%step)+step)%step;
    return r * Math.cos(Math.PI/n) / Math.cos(mod - Math.PI/n);
  },
  starX(n, k, r, t) {
    const p=_star(n,k); const m=p.length-1;
    const T=((t/(2*Math.PI))%1+1)%1, pos=T*m, s=Math.floor(pos), f=pos-s;
    return (p[s].x+(p[Math.min(s+1,m)].x-p[s].x)*f)*r;
  },
  starY(n, k, r, t) {
    const p=_star(n,k); const m=p.length-1;
    const T=((t/(2*Math.PI))%1+1)%1, pos=T*m, s=Math.floor(pos), f=pos-s;
    return (p[s].y+(p[Math.min(s+1,m)].y-p[s].y)*f)*r;
  },
};
if (typeof math === 'undefined') {
  document.body.innerHTML +=
    '<p style="color:#f88;padding:24px;font:14px sans-serif;max-width:520px">' +
    'vendor/math.min.js を読み込めません。<br>' +
    'intersection_locus.html と vendor/ フォルダを同じ場所に置き、<br>' +
    'ローカルサーバー（例: <code>python3 -m http.server</code>）で開いてください。</p>';
  throw new Error('math.js not loaded');
}
math.import({
  poly: HELPERS.poly,
  starX: HELPERS.starX,
  starY: HELPERS.starY,
}, { override: false });

function normExpr(s) {
  return String(s).replace(/π/g, 'pi').replace(/\bpi\b/gi, 'pi');
}

/** 式の数値が半径かどうかの説明（図形設定欄用） */
function formulaSizeHint(formula) {
  const s = normExpr(formula).trim();
  if (!s) return '';
  const ci = topComma(s);
  if (ci < 0) {
    if (/^\d+(\.\d+)?$/.test(s)) {
      return 'この値は<b>半径 r</b>です（直径ではありません。直径にしたいときは半分の値を入れてください）。';
    }
    const polyM = s.match(/^poly\s*\(\s*\d+\s*,\s*([\d.]+)/i);
    if (polyM) return `poly の第2引数 <b>${polyM[1]}</b> は正多角形の<b>半径</b>（外接円の半径）です。`;
    const starM = s.match(/^star[XY]\s*\(\s*\d+\s*,\s*\d+\s*,\s*([\d.]+)/i);
    if (starM) return `starX / starY の第3引数 <b>${starM[1]}</b> は星形の<b>半径</b>（外接円）です。`;
    const cardM = s.match(/^\(\s*1\s*\+\s*cos\s*\(\s*t\s*\)\s*\)\s*\*\s*([\d.]+)/i);
    if (cardM) {
      const a = parseFloat(cardM[1]);
      return `係数 <b>${cardM[1]}</b> はスケール（極座標で先端までの最大距離 ≈ <b>${fmtN(2 * a, 0)}</b>）です。`;
    }
    const roseM = s.match(/(?:^|(?:\*\s*))([\d.]+)\s*\*\s*cos\s*\(\s*\d+\s*\*\s*t\s*\)/i)
      || s.match(/cos\s*\(\s*\d+\s*\*\s*t\s*\)\s*\*\s*([\d.]+)/i);
    if (roseM) {
      const amp = roseM[1];
      return `係数 <b>${amp}</b> は極座標での<b>最大半径</b>（花弁の長さ）です。`;
    }
    return '極座標 <b>r(t)</b>：数値だけのときは<b>半径</b>、式のときは t の関数です。';
  }
  const xy = s.split(',');
  const xs = xy[0] || '', ys = xy[1] || '';
  const cosM = xs.match(/cos\s*\(\s*t\s*\)\s*\*\s*([\d.]+)/i);
  const sinM = ys.match(/sin\s*\(\s*t\s*\)\s*\*\s*([\d.]+)/i);
  if (cosM && sinM) {
    const r1 = cosM[1], r2 = sinM[1];
    if (Math.abs(parseFloat(r1) - parseFloat(r2)) < 1e-6) {
      return `x,y の係数 <b>${r1}</b> は円の<b>半径</b>です。`;
    }
  }
  if (/starX\s*\(/i.test(s)) {
    const m = s.match(/starX\s*\(\s*\d+\s*,\s*\d+\s*,\s*([\d.]+)/i);
    if (m) return `starX / starY の第3引数 <b>${m[1]}</b> は<b>半径</b>です。`;
  }
  if (/poly\s*\(/i.test(s)) {
    const m = s.match(/poly\s*\(\s*\d+\s*,\s*([\d.]+)/i);
    if (m) return `poly の第2引数 <b>${m[1]}</b> は<b>半径</b>です。`;
  }
  const astM = xs.match(/pow\s*\(\s*cos\s*\(\s*t\s*\)\s*,\s*3\s*\)\s*\*\s*([\d.]+)/i);
  if (astM) return `係数 <b>${astM[1]}</b> はアステロイド頂点までの<b>半径</b>です。`;
  const lisM = xs.match(/cos\s*\(\s*\d+\s*\*\s*t\s*\)\s*\*\s*([\d.]+)/i);
  if (lisM && /sin\s*\(\s*\d+\s*\*\s*t/i.test(ys)) {
    return `各係数（例 <b>${lisM[1]}</b>）は軸方向の<b>振幅</b>（半幅）です。`;
  }
  if (/^t\s*$/i.test(xs.trim()) && /^0\s*$/i.test(ys.trim())) {
    return '直線：長さは <b>t 範囲</b> で決まります（半径の概念はありません）。';
  }
  return '';
}

function updateFormulaHint(i) {
  const el = document.getElementById(`fhint${i}`);
  if (!el) return;
  if (isParabolaShape(shapes[i])) {
    el.innerHTML = '';
    el.style.display = 'none';
    return;
  }
  const hint = formulaSizeHint(shapes[i].formula);
  el.innerHTML = hint;
  el.style.display = hint ? '' : 'none';
}

function topComma(s) {
  let d=0;
  for (let i=0; i<s.length; i++) {
    if (s[i]==='('||s[i]==='[') d++;
    else if (s[i]===')'||s[i]===']') d--;
    else if (s[i]===',' && d===0) return i;
  }
  return -1;
}

function parseT(s) {
  try {
    const v = math.evaluate(normExpr(s));
    return typeof v === 'number' && isFinite(v) ? v : NaN;
  } catch { return NaN; }
}

function compileCurve(formula, tMin, tMax, N) {
  const src = normExpr(formula);
  const ci  = topComma(src);
  let rEval, xEval, yEval, isPolar;
  try {
    if (ci < 0) {
      rEval = math.compile(src.trim());
      isPolar = true;
    } else {
      xEval = math.compile(src.slice(0, ci).trim());
      yEval = math.compile(src.slice(ci + 1).trim());
      isPolar = false;
    }
  } catch (e) { throw e; }
  const pts = [];
  for (let i = 0; i <= N; i++) {
    const t = tMin + (tMax - tMin) * i / N;
    try {
      let x, y;
      const sc = { t };
      if (isPolar) {
        const r = rEval.evaluate(sc);
        x = r * Math.cos(t);
        y = r * Math.sin(t);
      } else {
        x = xEval.evaluate(sc);
        y = yEval.evaluate(sc);
      }
      pts.push(isFinite(x) && isFinite(y) ? { x, y } : null);
    } catch { pts.push(null); }
  }
  return { pts, isPolar };
}

// ─── Parabola (quadratic Bezier, 3 draggable control points) ───────────
function sampleBezier3(p0, p1, p2, N) {
  const pts = [];
  for (let i = 0; i <= N; i++) {
    const t = i / N;
    const u = 1 - t;
    pts.push({
      x: u * u * p0.x + 2 * u * t * p1.x + t * t * p2.x,
      y: u * u * p0.y + 2 * u * t * p1.y + t * t * p2.y,
    });
  }
  return pts;
}

function worldToShapeLocal(s, wx, wy) {
  const ca = Math.cos(s.angle), sa = Math.sin(s.angle);
  const u = (wx - s.px) * ca + (wy - s.py) * sa;
  const v = -(wx - s.px) * sa + (wy - s.py) * ca;
  return { x: u + s.px - s.fx, y: v + s.py - s.fy };
}

function worldDeltaToLocal(s, dwx, dwy) {
  const ca = Math.cos(s.angle), sa = Math.sin(s.angle);
  return { x: dwx * ca + dwy * sa, y: -dwx * sa + dwy * ca };
}

function parabolaWorldPoints(s) {
  if (!s.parabola) return null;
  const { p0, p1, p2 } = s.parabola;
  return {
    p0: shapeWorldPoint(s, p0.x, p0.y),
    p1: shapeWorldPoint(s, p1.x, p1.y),
    p2: shapeWorldPoint(s, p2.x, p2.y),
  };
}

function initSymmetricParabola(shape, halfWidth, vertexHeight) {
  const w = Math.max(1, Math.abs(halfWidth));
  const h = vertexHeight;
  const baseY = 0;
  shape.parabola = {
    p0: { x: -w, y: baseY },
    p2: { x: w, y: baseY },
    p1: { x: 0, y: h },
  };
  shape.curveKind = 'parabola';
  shape.parabolaTMin = -w;
  shape.parabolaTMax = w;
  shape.tMin = -w;
  shape.tMax = w;
  shape.tMinS = String(-w);
  shape.tMaxS = String(w);
  shape.N = 250;
  shape.formula = `t, ${h}*(1-(t/${w})^2)`;
  shape.isPolar = false;
  refreshShapeCurve(shape, shape.N);
}

function parabolaHalfWidth(shape) {
  if (!shape.parabola) return 12;
  return Math.max(1, Math.abs(shape.parabola.p2.x - shape.parabola.p0.x) / 2);
}

function syncSymmetricParabola(shape) {
  if (!shape.parabola) return;
  const cx = (shape.parabola.p0.x + shape.parabola.p2.x) / 2;
  const baseY = (shape.parabola.p0.y + shape.parabola.p2.y) / 2;
  const w = parabolaHalfWidth(shape);
  const h = shape.parabola.p1.y;
  shape.parabola.p0 = { x: cx - w, y: baseY };
  shape.parabola.p2 = { x: cx + w, y: baseY };
  shape.parabola.p1 = { x: cx, y: h };
  shape.parabolaTMin = -w;
  shape.parabolaTMax = w;
  shape.tMin = -w;
  shape.tMax = w;
  shape.tMinS = String(-w);
  shape.tMaxS = String(w);
  shape.formula = `t, ${h}*(1-(t/${w})^2)`;
}

function initParabolaBezier(shape, xExpr, yExpr, tMin, tMax) {
  const xE = math.compile(normExpr(String(xExpr).trim()));
  const yE = math.compile(normExpr(String(yExpr).trim()));
  const at = t => {
    const sc = { t };
    return { x: xE.evaluate(sc), y: yE.evaluate(sc) };
  };
  const p0 = at(tMin);
  const p2 = at(tMax);
  const tm = (tMin + tMax) / 2;
  const mid = at(tm);
  shape.parabola = {
    p0: { x: p0.x, y: p0.y },
    p2: { x: p2.x, y: p2.y },
    p1: {
      x: 2 * mid.x - 0.5 * (p0.x + p2.x),
      y: 2 * mid.y - 0.5 * (p0.y + p2.y),
    },
  };
  shape.curveKind = 'parabola';
  shape.parabolaTMin = tMin;
  shape.parabolaTMax = tMax;
}

function refreshShapeCurve(shape, N) {
  N = N || shape.N || 250;
  if (shape.curveKind === 'parabola' && shape.parabola) {
    shape.pts = sampleBezier3(shape.parabola.p0, shape.parabola.p1, shape.parabola.p2, N);
    shape.isPolar = false;
    shape.error = null;
    shape.tMin = 0;
    shape.tMax = 1;
    return true;
  }
  return false;
}

function isParabolaShape(s) {
  return s.curveKind === 'parabola' && s.parabola;
}

// ─── Segment intersection ─────────────────────────────────────────────
function segX(p1,p2,p3,p4) {
  const dx1=p2.x-p1.x, dy1=p2.y-p1.y, dx2=p4.x-p3.x, dy2=p4.y-p3.y;
  const d=dx1*dy2-dy1*dx2;
  if (Math.abs(d)<1e-9) return null;
  const ex=p3.x-p1.x, ey=p3.y-p1.y;
  const t=(ex*dy2-ey*dx2)/d, u=(ex*dy1-ey*dx1)/d;
  if (t>=0&&t<=1&&u>=0&&u<=1) return {x:p1.x+t*dx1, y:p1.y+t*dy1};
  return null;
}

// ─── Draw pts to canvas (auto-scaled) ────────────────────────────────
function drawPtsTo(cv, pts, stroke, bg, lw) {
  const c=cv.getContext('2d');
  c.fillStyle=bg||'#0c0c18'; c.fillRect(0,0,cv.width,cv.height);
  if (!pts) return;
  const v=pts.filter(Boolean);
  if (v.length<2) return;
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  v.forEach(p=>{x0=Math.min(x0,p.x);x1=Math.max(x1,p.x);y0=Math.min(y0,p.y);y1=Math.max(y1,p.y);});
  const pad=cv.width*.1, cw=cv.width-2*pad, ch=cv.height-2*pad;
  const s=Math.min(cw/Math.max(x1-x0,.001), ch/Math.max(y1-y0,.001));
  const mx=(x0+x1)/2, my=(y0+y1)/2, ox=cv.width/2, oy=cv.height/2;
  c.strokeStyle=stroke; c.lineWidth=lw||1; c.lineCap='round';
  c.beginPath(); let pen=false;
  pts.forEach(p=>{
    if(p){const px=ox+(p.x-mx)*s,py=oy+(p.y-my)*s;
      if(!pen){c.moveTo(px,py);pen=true;}else c.lineTo(px,py);}
    else pen=false;
  });
  c.stroke();
}

}

function dupCountOf(s) {
  return Math.max(1, Math.min(18, s.dupCount | 0) || 1);
}

function orbitRadiusFromPivot(s) {
  const dr = Math.hypot(s.fx - s.px, s.fy - s.py);
  if (dr > 1e-6) return dr;
  if (!s.pts || !s.pts.length) return 80;
  let maxR = 0;
  for (const p of s.pts) {
    if (p) maxR = Math.max(maxR, Math.hypot(p.x, p.y));
  }
  return maxR || 80;
}

/** 回転軸周りの複製配置（k=0 が本体 fx,fy） */
function getDupCenters(s) {
  const count = dupCountOf(s);
  if (count === 1) return [{ fx: s.fx, fy: s.fy, primary: true }];
  const { px, py } = s;
  const r = orbitRadiusFromPivot(s);
  const baseAz = Math.atan2(s.fy - py, s.fx - px);
  const step = (2 * Math.PI) / count;
  const out = [];
  for (let k = 0; k < count; k++) {
    const az = baseAz + k * step;
    out.push({
      fx: px + r * Math.cos(az),
      fy: py + r * Math.sin(az),
      primary: k === 0,
    });
  }
  return out;
}

/** 旧仕様（複製ごとにタブ）を 1 タブ + dupCount に統合 */
function collapseLegacyDupTabs() {
  const groups = new Map();
  shapes.forEach((s, idx) => {
    if (!s.dupGroup) return;
    if (!groups.has(s.dupGroup)) groups.set(s.dupGroup, []);
    groups.get(s.dupGroup).push({ s, idx });
  });
  if (!groups.size) return;
  const remove = new Set();
  groups.forEach(list => {
    list.sort((a, b) => (a.s.dupIndex | 0) - (b.s.dupIndex | 0));
    const primary = list[0].s;
    primary.dupCount = list.length;
    delete primary.dupGroup;
    delete primary.dupIndex;
    for (let k = 1; k < list.length; k++) remove.add(list[k].idx);
  });
  [...remove].sort((a, b) => b - a).forEach(i => shapes.splice(i, 1));
}

function applyDuplicate(tabIdx, count) {
  const s = shapes[tabIdx];
  if (!s || s.error) return;
  s.dupCount = Math.max(1, Math.min(18, count | 0));
  resetTimingAndTrails();
}

function presetResolvedCurve(spec, fieldValues) {

function rndInt(min, max) {
  return min + Math.floor(Math.random() * (max - min + 1));
}
function rndFloat(min, max) {
  return min + Math.random() * (max - min);
}
function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function randomShapeLayout() {
  const spread = rndInt(120, 220);
  const sign = () => (Math.random() < 0.5 ? -1 : 1);
  let speed = rndFloat(-2.4, 2.4);
  if (Math.abs(speed) < 0.12) speed = sign() * rndFloat(0.3, 1.4);
  return {
    fx: sign() * rndInt(30, spread),
    fy: sign() * rndInt(30, spread),
    px: sign() * rndInt(10, spread),
    py: sign() * rndInt(10, spread),
    speed,
    angle: Math.random() * Math.PI * 2,
    paused: false,
    visible: true,
    dupCount: 1,
  };
}

function randomSimplePresetCurve(spec) {
  const r = rndInt(90, 175);

    };
  }
  return { formula: spec.formula, tMinS: spec.tMinS, tMaxS: spec.tMaxS, N: spec.N };
}

function presetPoolForRandom() {
  return PRESET_CATALOG.filter(s => s.type !== 'freehand');
}

function makeShapeFromPresetSpec(spec, hue) {
  if (spec.type === 'freehand') return null;
  const layout = randomShapeLayout();
  layout.hue = hue;
  if (spec.type === 'simple') {
    Object.assign(layout, randomSimplePresetCurve(spec), { curveKind: 'formula', parabola: null });
    return makeShape(layout);
  }
  const vals = randomPresetFieldValues(spec);
  if (spec.mode === 'parabola') {
    const v = spec.resolve(vals);
    const shape = makeShape({ ...layout, curveKind: 'parabola', parabola: null });
    try {
      initSymmetricParabola(shape, v.w, v.h);
      shape.error = null;
    } catch (e) {
      shape.error = e.message;
    }
    return shape;
  }
  const { formula, tMinS, tMaxS, N } = spec.resolve(vals);
  Object.assign(layout, { formula, tMinS, tMaxS, N, curveKind: 'formula', parabola: null });
  return makeShape(layout);
}

function buildRandomInitialShapes(count) {
  const pool = presetPoolForRandom().slice();
  const specs = [];
  while (specs.length < count && pool.length) {
    const i = rndInt(0, pool.length - 1);
    specs.push(pool.splice(i, 1)[0]);
  }
  const fallback = presetPoolForRandom();
  while (specs.length < count) specs.push(pickRandom(fallback));
  return specs.map((spec, i) => makeShapeFromPresetSpec(spec, SHAPE_HUES[i % SHAPE_HUES.length]));
}

function applyInitialShapes() {
  shapes.length = 0;
  const initSave = SAVES.find(sv => sv.isInitial);
  if (initSave && initSave.snap && initSave.snap.length) {
    initSave.snap.forEach(d => shapes.push(makeShape(d)));
  } else {
    buildRandomInitialShapes(2).forEach(s => shapes.push(s));
  }
  collapseLegacyDupTabs();
}

function applyPresetConfig(shapeIdx, spec, applyFormula) {
  if (spec.type === 'simple') {
    applyFormula(spec.formula, spec.tMinS, spec.tMaxS, spec.N);
  } else {
    const vals = readPresetFields(shapeIdx, spec);
    if (spec.mode === 'parabola') {
      applyParabolaFromPanel(shapeIdx, vals);
    } else {
      const { formula, tMinS, tMaxS, N } = spec.resolve(vals);
      applyFormula(formula, tMinS, tMaxS, N);
    }
  }
  resetPlaybackAfterPreset();
}

function applyParabolaFromPanel(i, vals) {
  const shape = shapes[i];
  if (!shape) return;
  const v = vals || readPresetFields(i, PRESET_CATALOG.find(s => s.id === 'parabola'));
  const w = Math.max(2, parseFloat(v.w) || 12);
  const h = parseFloat(v.h) || 5;
  try {
    initSymmetricParabola(shape, w, h);
    shape.error = null;
    const fInp = document.getElementById(`f${i}`);
    const errDiv = document.getElementById(`err${i}`);
    if (fInp) { fInp.value = shape.formula; fInp.classList.remove('ferr'); }
    if (errDiv) errDiv.style.display = 'none';
    const ftag = document.getElementById(`ftag${i}`);
    if (ftag) ftag.textContent = 'parabola';
    updateShapeThumb(i);
    updateFormulaHint(i);
  } catch (e) {
    shape.error = e.message;
    const errDiv = document.getElementById(`err${i}`);
    if (errDiv) { errDiv.textContent = e.message; errDiv.style.display = ''; }
  }
}

function clearPresetSelection(shapeIdx) {
  const strip = document.getElementById(`ps${shapeIdx}`);
  if (strip) strip.querySelectorAll('.p-item-selected').forEach(el => el.classList.remove('p-item-selected'));
  const panel = document.getElementById(`psParams${shapeIdx}`);
  if (panel) {
    panel.classList.remove('visible');
    panel.innerHTML = '';
  }
}

function buildPresetParamsPanel(shapeIdx, spec, shape, applyFormula) {
  const panel = document.getElementById(`psParams${shapeIdx}`);
  if (!panel) return;
  panel.innerHTML = '';
  panel.classList.add('visible');

  const title = document.createElement('div');
  title.className = 'preset-params-title';
  title.textContent = `${spec.name} の設定`;
  panel.appendChild(title);

  const fieldVals = defaultPresetFieldValues(spec, shape);
  const runApply = () => applyPresetConfig(shapeIdx, spec, applyFormula);

  spec.fields.forEach(f => {
    const row = document.createElement('div');
    row.className = 'preset-params-row';
    if (f.label) {
      const lab = document.createElement('label');
      lab.textContent = f.label;
      row.appendChild(lab);
    }
    let el;
    if (f.kind === 'select') {
      el = document.createElement('select');
      el.id = psId(shapeIdx, spec.id, f.id);
      (f.options || []).forEach(([val, text]) => {
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = text;
        if (val === (fieldVals[f.id] ?? f.def)) opt.selected = true;
        el.appendChild(opt);
      });
    } else {
      el = document.createElement('input');
      el.id = psId(shapeIdx, spec.id, f.id);
      el.type = f.kind === 'number' ? 'number' : 'text';
      el.value = fieldVals[f.id] ?? String(f.def ?? '');
      if (f.min != null) el.min = String(f.min);
      if (f.max != null) el.max = String(f.max);
      if (f.wide) el.className = 'wide';
    }
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); runApply(); }
    });
    row.appendChild(el);
    panel.appendChild(row);
  });

  const applyBtn = document.createElement('button');
  applyBtn.type = 'button';
  applyBtn.className = 'apply-ps';
  applyBtn.textContent = '適用';
  applyBtn.addEventListener('click', runApply);
  panel.appendChild(applyBtn);
}

function selectConfigPreset(strip, shapeIdx, spec, shape, applyFormula) {
  strip.querySelectorAll('.p-item').forEach(el => {
    el.classList.toggle('p-item-selected', el.dataset.presetId === spec.id);
  });
  buildPresetParamsPanel(shapeIdx, spec, shape, applyFormula);
}

function buildPresetStripForShape(strip, shapeIdx, shape, applyFormula, onFreehand) {
  PRESET_CATALOG.forEach(spec => {
    const item = document.createElement('div');
    item.className = 'p-item';
    if (spec.type === 'config') item.dataset.presetId = spec.id;

    const thumbCv = document.createElement('canvas');
    thumbCv.width = thumbCv.height = 38;
    thumbCv.getContext('2d').drawImage(spec._cv, 0, 0);
    item.appendChild(thumbCv);

    const lbl = document.createElement('span');
    lbl.textContent = spec.name;
    item.appendChild(lbl);

    if (spec.type === 'freehand') {
      item.addEventListener('click', () => {
        clearPresetSelection(shapeIdx);
        if (onFreehand) onFreehand(shapeIdx);
      });
      strip.appendChild(item);
      return;
    }

    if (spec.type === 'simple') {
      item.addEventListener('click', () => {
        clearPresetSelection(shapeIdx);
        applyPresetConfig(shapeIdx, spec, applyFormula);
      });
    } else {
      item.addEventListener('click', () => selectConfigPreset(strip, shapeIdx, spec, shape, applyFormula));
    }
    strip.appendChild(item);
  });
}

function redrawAllTrails() {
  tc.fillStyle = '#000';
  tc.fillRect(0, 0, W, H);
  if (!PAIRS || !PAIRS.length) return;
  PAIRS.forEach(({ i, j, h, enabled }) => {
    if (!enabled) return;
    const st = pairTrails[pairKey(i, j)];
    if (!st) return;
    tc.strokeStyle = `hsla(${h}, 82%, 62%, 0.88)`;
    tc.lineWidth = trailWidth;
    tc.lineCap = 'round';
    tc.lineJoin = 'round';
    st.tracks.forEach(tr => {
      if (tr.points.length < 2) return;
      tc.beginPath();
      let pen = false;
      tr.points.forEach(p => {
        const sx = wx(p.x), sy = wy(p.y);
        if (!pen) { tc.moveTo(sx, sy); pen = true; }
        else tc.lineTo(sx, sy);
      });
      tc.stroke();
    });
  });
}

function appendTrail(key, hue, worldPt, drawToCanvas = true) {
  if (!pairTrails[key]) pairTrails[key] = { tracks: [] };
  const st = pairTrails[key];
  let best = -1, bestD = TRAIL_MATCH / view.scale;
  st.tracks.forEach((tr, ti) => {
    const lp = tr.points[tr.points.length - 1];
    const d = Math.hypot(lp.x - worldPt.x, lp.y - worldPt.y);
    if (d < bestD) { bestD = d; best = ti; }
  });
  let prev = null;
  if (best >= 0) {
    const tr = st.tracks[best];
    prev = tr.points[tr.points.length - 1];
    tr.points.push(worldPt);
    if (tr.points.length > TRAIL_MAX) tr.points.shift();
  } else {
    st.tracks.push({ points: [worldPt] });
    if (st.tracks.length > 12) st.tracks.shift();
    return;
  }
  if (drawToCanvas && prev) {
    tc.strokeStyle = `hsla(${hue}, 82%, 62%, 0.88)`;
    tc.lineWidth = trailWidth;
    tc.lineCap = 'round';
    tc.beginPath();
    tc.moveTo(wx(prev.x), wy(prev.y));
    tc.lineTo(wx(worldPt.x), wy(worldPt.y));
    tc.stroke();
  }
}
